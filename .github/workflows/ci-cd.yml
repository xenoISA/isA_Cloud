name: isA Cloud CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # Test isa_common Python library
  # ============================================
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install isa_common with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./isA_common[dev]"

      - name: Run unit tests
        run: |
          cd isA_common
          python -m pytest tests/unit/ tests/component/ -v --tb=short

  # ============================================
  # Security scan (isA_Cloud files only)
  # ============================================
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          ignore-unfixed: true

  # ============================================
  # Validate Kubernetes manifests
  # ============================================
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: |
          helm lint deployments/charts/isa-service/

      - name: Validate Kubernetes YAML
        run: |
          # Check all YAML files in kubernetes/ are valid
          find deployments/kubernetes -name '*.yaml' -not -path '*/_legacy/*' | while read -r file; do
            echo "Validating: $file"
            python3 -c "import yaml; list(yaml.safe_load_all(open('$file')))" || exit 1
          done
