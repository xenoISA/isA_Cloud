name: Platform Build (unified images → GHCR)

# Unified native-amd64 build for the platform service images (isA_Cloud#349).
# ONE workflow builds every service as the canonical ghcr.io/xenoisa/isa-<svc>,
# so SN on-prem and isA SaaS (GCP) deploy the SAME images by config.
#
# Topology: this builds + pushes to GHCR only. GitHub-hosted runners CANNOT
# reach the SN Harbor (10.60.65.10, VPN-only) — mirror GHCR→Harbor from a
# VPN-connected host afterwards:
#   skopeo copy --dest-tls-verify=false --dest-creds admin:<pw> \
#     docker://ghcr.io/xenoisa/isa-<svc>:<tag> \
#     docker://10.60.65.10/isa/isa-<svc>:<tag>
#
# Prereq: a repo/org secret PLATFORM_BUILD_PAT (classic PAT or fine-grained
# token with `read` on the xenoisa service repos) for cross-repo checkout.
#
# Covers the self-contained + multi-repo services. NOT yet wired (TODO #349):
#   - isa-model  (Dockerfile is FROM isa-python-base:0.5.7 — needs the base
#                 image built+pushed first, then retagged in-runner)
#   - isa-os     (no Dockerfile in the repo yet — author one)
#   - frontends  (isa-console / isa-docs / isa-marketing — node builds)
#   - isa_user   (42 microservices — separate matrix over Dockerfile.microservice)

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Comma-separated svc list (e.g. isa-mcp,isa-data) or 'all'"
        default: "all"
        type: string
      tag:
        description: "Image tag to push (also pushes :latest)"
        default: "0.1.0"
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- platform base image (build FIRST; isa-os/isa-model FROM it) ---
          - svc: isa-python-base
            repos: isA_Vibe
            dockerfile: isA_Vibe/deployment/base/Dockerfile.python-base
            context: isA_Vibe
          # --- self-contained (single-repo build context) ---
          - svc: isa-mcp
            repos: isA_MCP
            dockerfile: isA_MCP/deployment/docker/Dockerfile
            context: isA_MCP
          - svc: isa-os
            repos: isA_OS
            dockerfile: isA_OS/web_services/deployment/docker/Dockerfile
            context: isA_OS/web_services
          - svc: isa-data
            repos: isA_Data
            dockerfile: isA_Data/deployment/docker/Dockerfile
            context: isA_Data
          - svc: isa-agent-sdk
            repos: isA_Agent_SDK
            dockerfile: isA_Agent_SDK/Dockerfile
            context: isA_Agent_SDK
          - svc: isa-mate
            repos: isA_Mate
            dockerfile: isA_Mate/Dockerfile
            context: isA_Mate
          - svc: isa-creative
            repos: isA_Creative
            dockerfile: isA_Creative/Dockerfile
            context: isA_Creative
          - svc: isa-training
            repos: isA_Training
            dockerfile: isA_Training/Dockerfile
            context: isA_Training
          # --- multi-repo build context (Dockerfile COPYs sibling repos) ---
          - svc: isa-agent
            repos: isA_Agent isA_Agent_SDK isA_Model isA_Cloud
            dockerfile: isA_Agent/deployment/docker/Dockerfile
            context: .
          # --- frontend (Next.js); needs isA_App_SDK nested at <repo>/isA_App_SDK ---
          - svc: isa-console
            repos: isA_Console
            dockerfile: isA_Console/Dockerfile
            context: isA_Console
    name: build ${{ matrix.svc }}
    steps:
      - name: Select (skip if not requested)
        id: pick
        run: |
          want="${{ inputs.services }}"
          if [ "$want" = "all" ] || echo ",$want," | grep -q ",${{ matrix.svc }},"; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"; echo "skipping ${{ matrix.svc }}"
          fi

      - name: Checkout service repo(s) into workspace
        if: steps.pick.outputs.go == 'true'
        run: |
          for r in ${{ matrix.repos }}; do
            echo "cloning $r"
            git clone --depth 1 \
              "https://x-access-token:${{ secrets.PLATFORM_BUILD_PAT }}@github.com/xenoisa/$r.git" "$r"
          done

      - name: "(frontend) nest isA_App_SDK for Next.js link deps"
        if: steps.pick.outputs.go == 'true' && matrix.svc == 'isa-console'
        run: |
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.PLATFORM_BUILD_PAT }}@github.com/xenoisa/isA_App_SDK.git" \
            isA_Console/isA_App_SDK

      - name: Set up Buildx
        if: steps.pick.outputs.go == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.pick.outputs.go == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.svc }} (native amd64)
        if: steps.pick.outputs.go == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/xenoisa/${{ matrix.svc }}:${{ inputs.tag }}
            ghcr.io/xenoisa/${{ matrix.svc }}:latest
