name: Deploy Services

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (all, gateway, mcp, model, agent, user, blockchain)'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - gateway
        - mcp
        - model
        - agent
        - user
        - blockchain
      environment:
        description: 'Environment to deploy to (production requires promote-to-production workflow)'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: isa-platform-cluster

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    # Lift the (optional) Slack webhook secret into the job env so that step
    # `if:` conditions can test whether it is configured. The `secrets` context
    # is NOT available in `if:` expressions, but `env` is.
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
    - name: Checkout isA_Cloud
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Deploy Services
      env:
        GITHUB_SHA: ${{ github.sha }}
      run: |
        # deploy-service.sh was removed when the deployment tooling moved to
        # Helm-based deploys; deploy.sh is its replacement.
        # New CLI: deploy.sh <command> [namespace] [version]  (no trailing action arg)
        chmod +x deployments/scripts/deploy.sh
        SERVICE="${{ github.event.inputs.service || 'all' }}"
        ENVIRONMENT="${{ github.event.inputs.environment || 'staging' }}"
        NAMESPACE="isa-cloud-${ENVIRONMENT}"
        ./deployments/scripts/deploy.sh "$SERVICE" "$NAMESPACE"

    # Slack notifications are OPTIONAL and skipped unless the repo has the
    # SLACK_WEBHOOK_URL secret configured. To enable: a maintainer must add
    # the SLACK_WEBHOOK_URL repository/environment secret. Without it these
    # steps are skipped — the deploy job itself never fails on a missing secret.
    # NOTE: 8398a7/action-slack@v3 reads the webhook from the SLACK_WEBHOOK_URL
    # env var; `webhook_url`/`message` are not valid inputs for this action.
    - name: Notify Slack on Success
      if: success() && env.SLACK_WEBHOOK_URL != ''
      uses: 8398a7/action-slack@v3
      with:
        status: success
        text: |
          ✅ Deployment successful!
          Service: ${{ github.event.inputs.service || 'all' }}
          Environment: ${{ github.event.inputs.environment || 'staging' }}
          Commit: ${{ github.sha }}

    - name: Notify Slack on Failure
      if: failure() && env.SLACK_WEBHOOK_URL != ''
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        text: |
          ❌ Deployment failed!
          Service: ${{ github.event.inputs.service || 'all' }}
          Environment: ${{ github.event.inputs.environment || 'staging' }}
          Commit: ${{ github.sha }}
