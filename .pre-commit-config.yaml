# Pre-commit configuration for isA Cloud
#
# Fully version-pinned baseline: every hook has an explicit `rev` so lint is
# deterministic and never goes red just because a tool published a new release.
# The black / isort / ruff revs here MUST match the pinned versions in
# isA_common/pyproject.toml [project.optional-dependencies].dev — keep them in sync.
#
# Usage:
#   pip install pre-commit
#   pre-commit install                 # enable the git hook
#   pre-commit run --all-files         # run every hook over the whole repo
#   pre-commit autoupdate              # bump revs (review + sync pyproject.toml after)
#
# Docs: https://pre-commit.com/

repos:
  # ============================================
  # Secret Detection - CRITICAL SECURITY CHECK
  # ============================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: gitleaks - Detect hardcoded secrets

  # ============================================
  # General File Checks
  # ============================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Ensure files end with newline
      - id: check-yaml
        name: Check YAML syntax
        args: ['--unsafe']  # Allow custom tags in K8s manifests
        # Helm chart templates are Go-templated, not valid YAML — they are
        # validated by `helm lint` in CI (see ci-cd.yml validate-manifests job).
        exclude: ^deployments/charts/.*/templates/
      - id: check-json
        name: Check JSON syntax
      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: detect-private-key
        name: Detect private keys
      - id: check-case-conflict
        name: Check for case conflicts

  # ============================================
  # Python - Formatting
  # ============================================
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        name: Format Python code with Black
        language_version: python3
        files: \.py$

  - repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
      - id: isort
        name: Sort Python imports
        args: ["--profile", "black"]
        files: \.py$

  # ============================================
  # Python - Linting (ruff replaces flake8)
  # ============================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        name: Lint Python code with Ruff
        args: ["--fix"]
        files: \.py$

# ============================================
# CI Configuration
# ============================================
# The Python lint job in .github/workflows/ci-cd.yml installs the exact same
# black / isort / ruff versions (via isA_common[dev]) so CI and pre-commit agree.
#
# To scan git history for previously committed secrets:
#   gitleaks detect --source . --verbose --log-opts="--all"
