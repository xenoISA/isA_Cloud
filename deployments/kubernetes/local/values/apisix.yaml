# APISIX Helm Values - LOCAL (Simple)
# Chart: apisix/apisix
# Install: helm install apisix apisix/apisix -n isa-cloud-local -f local/values/apisix.yaml
#
# Note: Built-in etcd is for dev/testing only. For production, use external etcd.
# Source: https://github.com/apache/apisix-helm-chart

# Gateway service configuration
service:
  type: NodePort
  http:
    enabled: true
    servicePort: 80
    containerPort: 9080
    nodePort: 30080
  tls:
    servicePort: 443
    nodePort: 30943  # Matches kind-config mapping to localhost:9443
  stream:
    enabled: false

# APISIX image/runtime settings
image:
  repository: apache/apisix
  tag: 3.8.0-debian

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

apisix:
  ssl:
    enabled: true
    containerPort: 9443

  dns:
    resolvers:
      - 10.96.0.10
    validity: 30
    timeout: 5

  # Admin API configuration
  admin:
    enabled: true
    type: NodePort
    port: 9180
    servicePort: 9180
    nodePort: 30180
    credentials:
      admin: "edd1c9f034335f136f87ad84b625c8f1"
    allow:
      ipList:
        - 0.0.0.0/0

  discovery:
    enabled: true
    registry:
      consul:
        servers:
          - "http://consul-server.isa-cloud-local.svc.cluster.local:8500"
        default_service:
          host: 127.0.0.1
          port: 20999
        fetch_interval: 3
        timeout:
          connect: 2000
          read: 2000
          wait: 60
        keepalive: true
        default_weight: 1

# Local dev uses the chart-managed etcd statefulset (apisix-etcd)
etcd:
  enabled: true

# Dashboard - enabled for local dev
dashboard:
  enabled: true
  service:
    type: NodePort
    nodePort: 30010  # Matches kind-config mapping to localhost:9010

# Ingress controller - disabled
ingress-controller:
  enabled: false

# Single replica for local
replicaCount: 1
