# Redis Helm Values - LOCAL (Simple)
# Chart: bitnami/redis
# Install: helm install redis bitnami/redis -n isa-cloud-local -f local/values/redis.yaml

# Standalone mode (no replication for local dev)
architecture: standalone

# Authentication
auth:
  enabled: true
  password: "staging_redis_2024"

# Master configuration
master:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: true
    size: 5Gi

  # Service - NodePort for local access
  service:
    type: NodePort
    ports:
      redis: 6379
    nodePorts:
      redis: "30379"

  # Configuration
  configuration: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru

  # Bitnami Redis defaults to shell-based health probes. Under local kind,
  # repeated probe timeouts left defunct child processes on the worker node.
  # TCP probes are enough for local readiness and avoid spawning shells.
  customLivenessProbe:
    tcpSocket:
      port: 6379
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 5

  customReadinessProbe:
    tcpSocket:
      port: 6379
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 3
    successThreshold: 1
    failureThreshold: 5

  podLabels:
    tier: infrastructure
    environment: local

# Disable replica for local
replica:
  replicaCount: 0

# Metrics (redis-exporter sidecar)
metrics:
  enabled: true
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
