# Prometheus Helm Values - LOCAL
# Chart: prometheus-community/prometheus
# Install: helm install prometheus prometheus-community/prometheus -n isa-cloud-local -f local/values/prometheus.yaml

# Disable components not needed for local dev
alertmanager:
  enabled: false

kube-state-metrics:
  enabled: false

prometheus-node-exporter:
  enabled: false

prometheus-pushgateway:
  enabled: false

# Server configuration
server:
  replicas: 1

  retention: "24h"
  retentionSize: "1GB"

  persistentVolume:
    enabled: true
    size: 5Gi

  # Resources bumped (#211): the prior 500m/512Mi made Prometheus pick
  # GOMAXPROCS=1 + GOMEMLIMIT~483MB — WAL replay was CPU-starved (measured
  # 2m5s) and steady state was GC-heavy. 1 CPU / 1Gi gives replay headroom.
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # Startup probe (#211): WAL replay (2m5s) outran the liveness kill window
  # (~75s), so the container was killed mid-replay in a slow crashloop.
  # The startupProbe holds liveness/readiness off until /-/healthy responds —
  # failureThreshold 30 x 10s = 5 min replay budget.
  startupProbe:
    enabled: true
    periodSeconds: 10
    failureThreshold: 30
    timeoutSeconds: 5

  podLabels:
    tier: infrastructure
    environment: local

  # Expose via NodePort (30090 -> localhost:9090)
  service:
    type: NodePort
    nodePort: 30090
    servicePort: 80

  global:
    scrape_interval: 15s
    evaluation_interval: 15s

  # Enable remote write receiver for Tempo metrics generator
  extraFlags:
    - "web.enable-remote-write-receiver"
    - "enable-feature=exemplar-storage"

# Extra scrape configs — appended to the default chart jobs
extraScrapeConfigs: |
  - job_name: 'isa-annotated-pods'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - isa-cloud-local
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: replace
        target_label: app
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        action: replace
        target_label: app
        regex: (.+)
  - job_name: 'isa-annotated-services'
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names:
            - isa-cloud-local
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_service_name]
        action: replace
        target_label: service

# Disable test pod
configmapReload:
  prometheus:
    enabled: true
