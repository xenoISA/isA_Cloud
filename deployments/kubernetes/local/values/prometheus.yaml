# Prometheus Helm Values - LOCAL
# Chart: prometheus-community/prometheus
# Install: helm install prometheus prometheus-community/prometheus -n isa-cloud-local -f local/values/prometheus.yaml

# Disable components not needed for local dev
alertmanager:
  enabled: false

kube-state-metrics:
  enabled: false

prometheus-node-exporter:
  enabled: false

prometheus-pushgateway:
  enabled: false

# Server configuration
server:
  replicas: 1

  retention: "24h"
  retentionSize: "1GB"

  persistentVolume:
    enabled: true
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  podLabels:
    tier: infrastructure
    environment: local

  # Expose via NodePort (30090 -> localhost:9090)
  service:
    type: NodePort
    nodePort: 30090
    servicePort: 80

  global:
    scrape_interval: 15s
    evaluation_interval: 15s

  # Enable remote write receiver for Tempo metrics generator
  extraFlags:
    - "web.enable-remote-write-receiver"
    - "enable-feature=exemplar-storage"

# Extra scrape configs — appended to the default chart jobs
extraScrapeConfigs: |
  - job_name: 'isa-annotated-pods'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - isa-cloud-local
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: replace
        target_label: app
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        action: replace
        target_label: app
        regex: (.+)
  - job_name: 'isa-annotated-services'
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names:
            - isa-cloud-local
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_service_name]
        action: replace
        target_label: service

# Disable test pod
configmapReload:
  prometheus:
    enabled: true
