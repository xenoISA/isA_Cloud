# NATS Helm Values - LOCAL (Simple)
# Chart: nats/nats
# Install: helm install nats nats/nats -n isa-cloud-local -f local/values/nats.yaml

# Configuration
config:
  cluster:
    enabled: false

  jetstream:
    enabled: true
    fileStore:
      enabled: true
      dir: /data
      pvc:
        enabled: true
        size: 5Gi
    memoryStore:
      enabled: true
      maxSize: 256Mi

  monitor:
    enabled: true
    port: 8222

  nats:
    port: 4222

# Container resources
container:
  image:
    tag: "2.10.22-alpine"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Service - use merge to set NodePort
service:
  enabled: true
  ports:
    nats:
      enabled: true
    monitor:
      enabled: true
  merge:
    spec:
      type: NodePort
      ports:
        - name: nats
          port: 4222
          targetPort: 4222
          nodePort: 30422
        - name: monitor
          port: 8222
          targetPort: 8222
          nodePort: 30822

# Pod labels (using podTemplate)
podTemplate:
  merge:
    metadata:
      labels:
        tier: infrastructure
        environment: local

# Startup probe — allow 300s for JetStream recovery
startupProbe:
  enabled: true
  periodSeconds: 10
  failureThreshold: 30

# Single replica for local
replicaCount: 1
