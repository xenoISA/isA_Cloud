# =============================================================================
# Actions Runner Controller (ARC) — runner scale set Helm values (local / kind)
# =============================================================================
# Chart: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set
# Namespace: arc-runners
# Release name: isa-kind-runners  (this becomes the `runs-on` label — see below)
#
# This chart installs one AutoscalingRunnerSet + its listener. The listener
# long-polls the GitHub Actions service; each queued job gets a fresh ephemeral
# runner pod that is destroyed after the job — no state leaks between jobs.
#
# Install (see ../scripts/install-arc.sh for the one-command path):
#   helm upgrade --install isa-kind-runners \
#     oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set \
#     --namespace arc-runners --create-namespace \
#     -f deployments/kubernetes/local/arc/values/runner-scale-set.yaml
# =============================================================================

# -----------------------------------------------------------------------------
# GitHub target
# -----------------------------------------------------------------------------
# Org-level registration — the runner scale set is available to every repo in
# the `xenoISA` org (scope it further with an org runner group, see runbook).
githubConfigUrl: "https://github.com/xenoISA"

# GitHub App auth. The Secret is created OUT OF BAND from the template at
# ../manifests/github-app-secret.template.yaml (never commit a real key).
# The chart reads github_app_id / github_app_installation_id / github_app_private_key
# keys from this Secret.
githubConfigSecret: arc-github-app

# Runner group boundary in the xenoISA org. The org admin must create this
# runner group before installing the scale set and scope it to the isA repos
# that are allowed to consume local-kind CI capacity. This keeps arbitrary org
# repos from scheduling jobs onto the local cluster.
runnerGroup: "isA CI"

# -----------------------------------------------------------------------------
# Controller service account — required to be explicit
# -----------------------------------------------------------------------------
# The scale-set chart binds RBAC to the controller's ServiceAccount. It tries to
# auto-discover it, which fails at `helm template` time (and any time the
# controller is installed after the scale set). Pin it explicitly to the
# controller release: namespace `arc-systems`, SA `arc-gha-rs-controller`
# (see values/controller.yaml -> serviceAccount.name).
controllerServiceAccount:
  namespace: arc-systems
  name: arc-gha-rs-controller

# -----------------------------------------------------------------------------
# Autoscaling — scale 0 -> N -> 0
# -----------------------------------------------------------------------------
# minRunners: 0 means zero idle RAM burn on the kind cluster when no CI is
# running. maxRunners caps concurrency so a burst of jobs cannot exhaust the
# 3-node kind cluster. Tune maxRunners up during the 19-repo rollout (#291).
minRunners: 0
maxRunners: 4

# -----------------------------------------------------------------------------
# Runner label / `runs-on`
# -----------------------------------------------------------------------------
# The scale set is addressed in workflows by its INSTALLATION NAME (the Helm
# release name), i.e. `runs-on: isa-kind-runners`.
#
# The 4 repos already on self-hosted runners (isA_Console, isA_MCP, isA_Vibe)
# use `runs-on: self-hosted`. To keep those workflows working UNCHANGED, the
# runnerScaleSetName below is ALSO set to `self-hosted` so the scale set
# answers the existing label. Workflow migration to a kind-specific label is
# story #289 — do not change `runs-on` in any repo here.
runnerScaleSetName: "self-hosted"

# -----------------------------------------------------------------------------
# Runner container mode — Docker-in-Docker
# -----------------------------------------------------------------------------
# `dind` gives each runner pod its own Docker daemon sidecar so `docker build`
# jobs work without a shared host socket. This is the safe default for CI that
# builds images. The dind sidecar requires a privileged container — acceptable
# on a local kind cluster; revisit (rootless / buildkit) before any shared env.
containerMode:
  type: "dind"

# -----------------------------------------------------------------------------
# Runner pod spec
# -----------------------------------------------------------------------------
template:
  metadata:
    labels:
      app.kubernetes.io/part-of: isa-cloud
      app.kubernetes.io/component: arc-runner
  spec:
    # ARC injects the runner + (for dind) the dind sidecar. We only override
    # the runner container's resource envelope so a job pod stays within the
    # kind node budget.
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        command: ["/home/runner/run.sh"]
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 4Gi

# -----------------------------------------------------------------------------
# Listener pod — long-polls GitHub for queued jobs
# -----------------------------------------------------------------------------
listenerTemplate:
  metadata:
    labels:
      app.kubernetes.io/part-of: isa-cloud
      app.kubernetes.io/component: arc-listener
  spec:
    containers:
      - name: listener
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
