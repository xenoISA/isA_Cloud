# =============================================================================
# Actions Runner Controller (ARC) — controller Helm values (local / kind)
# =============================================================================
# Chart: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller
# Namespace: arc-systems
#
# This is the modern ARC ("scale set" model). The controller watches
# AutoscalingRunnerSet CRDs and reconciles ephemeral runner pods. It does NOT
# itself talk to GitHub for job assignment — each runner-scale-set listener does.
#
# Install (see ../scripts/install-arc.sh for the one-command path):
#   helm upgrade --install arc \
#     oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller \
#     --namespace arc-systems --create-namespace \
#     -f deployments/kubernetes/local/arc/values/controller.yaml
# =============================================================================

# Single controller replica is correct for a local kind cluster. The controller
# is stateless; leader election is unnecessary at replicas: 1.
replicaCount: 1

# Surface enough log detail to debug listener / token issues during the pilot.
flags:
  logLevel: "info"
  logFormat: "text"
  # Watch only the namespace where runner scale sets live. Keeps RBAC tight and
  # avoids the controller reconciling resources in unrelated namespaces.
  watchSingleNamespace: "arc-runners"
  # Leave runner-pod cleanup to the scale-set listener (default behaviour).
  updateStrategy: "immediate"

serviceAccount:
  create: true
  name: "arc-gha-rs-controller"

# Modest footprint — the controller is a lightweight reconcile loop.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Run as non-root; ARC images already ship a non-root user.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

podLabels:
  app.kubernetes.io/part-of: isa-cloud
  app.kubernetes.io/component: arc-controller

# Tolerate the kind control-plane / worker layout without special scheduling.
nodeSelector: {}
tolerations: []
affinity: {}
