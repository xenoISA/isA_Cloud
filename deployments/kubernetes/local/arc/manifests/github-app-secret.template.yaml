# =============================================================================
# ARC GitHub App auth Secret — TEMPLATE
# =============================================================================
# IMPORTANT: This is a TEMPLATE. Do NOT commit a real private key to git.
#
# ARC authenticates to GitHub as a GitHub App (not a PAT — no monthly token
# rotation). The `gha-runner-scale-set` chart reads these three keys from the
# Secret named in values/runner-scale-set.yaml -> githubConfigSecret.
#
# Usage:
#   1. Register a GitHub App on the `xenoISA` org and install it (see runbook:
#      docs/runbooks/arc-self-hosted-runners.md, section "GitHub App setup").
#   2. Copy this file:
#        cp github-app-secret.template.yaml github-app-secret.local.yaml
#   3. Fill in App ID, installation ID, and paste the downloaded .pem key.
#   4. Apply it:
#        kubectl apply -f github-app-secret.local.yaml
#   5. NEVER commit github-app-secret.local.yaml — it is gitignored.
#
# Or create it imperatively from the .pem file without writing a manifest:
#   kubectl create secret generic arc-github-app \
#     --namespace arc-runners \
#     --from-literal=github_app_id=<APP_ID> \
#     --from-literal=github_app_installation_id=<INSTALLATION_ID> \
#     --from-file=github_app_private_key=<path-to-private-key.pem>
#
# The install script (../scripts/install-arc.sh) automates the imperative form
# when ARC_GITHUB_APP_ID / ARC_GITHUB_APP_INSTALLATION_ID / ARC_GITHUB_APP_PRIVATE_KEY_PATH
# env vars are set.
# =============================================================================
---
apiVersion: v1
kind: Secret
metadata:
  name: arc-github-app
  namespace: arc-runners
  labels:
    app.kubernetes.io/part-of: isa-cloud
    app.kubernetes.io/component: arc-runner
    tier: ci
type: Opaque
stringData:
  # Numeric App ID — found on the GitHub App's settings page.
  github_app_id: "<REPLACE_WITH_GITHUB_APP_ID>"

  # Installation ID — the numeric id in the URL after you install the App on
  # the org: https://github.com/organizations/xenoISA/settings/installations/<ID>
  github_app_installation_id: "<REPLACE_WITH_GITHUB_APP_INSTALLATION_ID>"

  # The App's private key — the FULL contents of the downloaded .pem file,
  # including the BEGIN/END lines. Indent every line under the `|` block.
  github_app_private_key: |
    -----BEGIN RSA PRIVATE KEY-----
    <REPLACE_WITH_GITHUB_APP_PRIVATE_KEY_PEM_CONTENTS>
    -----END RSA PRIVATE KEY-----
