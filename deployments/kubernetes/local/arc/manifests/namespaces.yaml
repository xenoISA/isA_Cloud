# =============================================================================
# ARC namespaces — local / kind
# =============================================================================
# arc-systems : the ARC controller (gha-runner-scale-set-controller)
# arc-runners : the runner scale set, its listener, and ephemeral runner pods
#
# Kept separate so the controller's RBAC stays narrow and runner pods (which
# run untrusted CI workloads) are isolated from the controller.
# =============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: arc-systems
  labels:
    app.kubernetes.io/part-of: isa-cloud
    app.kubernetes.io/component: arc-controller
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: v1
kind: Namespace
metadata:
  name: arc-runners
  labels:
    app.kubernetes.io/part-of: isa-cloud
    app.kubernetes.io/component: arc-runner
    # Runner pods in `dind` mode need a privileged dind sidecar, so this
    # namespace runs at the `privileged` PSA level. Acceptable on a local kind
    # cluster; revisit (rootless / buildkit) before any shared environment.
    pod-security.kubernetes.io/enforce: privileged
