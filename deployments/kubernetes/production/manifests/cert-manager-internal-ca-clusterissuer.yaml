apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
  labels:
    app.kubernetes.io/name: cert-manager
    isa.io/managed-by: isa-cloud-production
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: isa-prod-internal-ca
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: cert-manager
    isa.io/managed-by: isa-cloud-production
spec:
  isCA: true
  commonName: isa-prod-internal-ca
  secretName: isa-prod-internal-ca
  duration: 87600h
  renewBefore: 720h
  privateKey:
    algorithm: RSA
    size: 4096
    rotationPolicy: Always
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: selfsigned-issuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: internal-ca-issuer
  labels:
    app.kubernetes.io/name: cert-manager
    isa.io/managed-by: isa-cloud-production
spec:
  ca:
    secretName: isa-prod-internal-ca
