# Monthly Backup Restore Verification CronJob
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-verify
  namespace: isa-cloud-production
  labels:
    app: backup-verify
spec:
  schedule: "0 6 1 * *"  # First of every month at 6 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800  # 30 min max
      template:
        metadata:
          labels:
            app: backup-verify
        spec:
          restartPolicy: Never
          serviceAccountName: backup-verify
          containers:
            - name: verify
              image: bitnami/kubectl:latest
              command:
                - /bin/bash
                - /scripts/verify-restore.sh
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
          volumes:
            - name: scripts
              configMap:
                name: backup-verify-scripts
                defaultMode: 0755
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-verify
  namespace: isa-cloud-production
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup-verify
  namespace: isa-cloud-production
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "namespaces"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup-verify
  namespace: isa-cloud-production
subjects:
  - kind: ServiceAccount
    name: backup-verify
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backup-verify
