# Persistent Model Cache — shared across inference engine pods
# Uses fast storage class for SSD-backed model storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-vllm
  namespace: isa-cloud-production
  labels:
    app: model-cache
    engine: vllm
spec:
  accessModes:
    - ReadWriteOnce
  # SN bootstrap uses the replicated local class; infortrend-iscsi returned
  # CSI FSS provisioning errors for large model-cache PVCs on 2026-06-07.
  storageClassName: local-replica2-delay-bind
  resources:
    requests:
      storage: 200Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-embedding
  namespace: isa-cloud-production
  labels:
    app: model-cache
    engine: vllm
    model-family: embedding
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-replica2-delay-bind
  resources:
    requests:
      storage: 200Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-triton
  namespace: isa-cloud-production
  labels:
    app: model-cache
    engine: triton
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-replica2-delay-bind
  resources:
    requests:
      storage: 200Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: model-registry
  namespace: isa-cloud-production
  labels:
    app: model-cache
data:
  # Model versions pinned here — no implicit "latest"
  # Format: MODEL_ID=huggingface_id:revision
  models.env: |
    VLLM_MODEL_ID=Qwen/Qwen3.6-27B-FP8
    VLLM_MODEL_REVISION=main
    VLLM_DRAFT_MODEL_ID=Qwen/Qwen3-0.6B
    VLLM_SERVED_MODEL_NAME=qwen3.6-27b
    VLLM_ENABLE_THINKING=false
    EMBEDDING_MODEL_ID=Qwen/Qwen3-Embedding-8B
    RERANK_MODEL_ID=BAAI/bge-reranker-v2-m3
    STT_MODEL_ID=openai/whisper-large-v3-turbo
    TTS_MODELS=fish-speech-s2,higgs-audio-v2,kokoro
    IMAGE_MODELS=qwen-image-2.0,flux-2-schnell
    VIDEO_MODELS=wan-2.2
    # Keep pre-pull narrow by default. Specialty engines move from staged to
    # resident only after their service manifests and routing adapters are ready.
    MODEL_PREPULL_IDS=Qwen/Qwen3.6-27B-FP8,Qwen/Qwen3-Embedding-8B
