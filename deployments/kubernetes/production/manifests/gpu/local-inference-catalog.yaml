# Local Inference Catalog — unified isA_Cloud production profile
#
# This ConfigMap is the deployment-time contract that combines:
# - isA_Model's complete local inference model catalog
# - SN production's 3-node x 2-GPU hardware reality
# - Kubernetes role labels as the cross-node placement authority
#
# It does not force every model to be resident. `residency` describes the
# intended deployment mode so the model service can route safely before each
# specialty engine is promoted.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: local-inference-catalog
  namespace: isa-cloud-production
  labels:
    app: model-runtime
    isa.io/component: local-inference-catalog
data:
  gpu-policy.yaml: |
    hardware:
      cluster_profile: sn-3node-blackwell
      nodes: 3
      physical_gpus_per_node: 2
      physical_gpu_total: 6
      per_gpu_vram_mb: 97887
      gpu_product: NVIDIA RTX PRO 6000 Blackwell Max-Q Workstation Edition

    role_groups:
      llm:
        node_labels:
          isa.io/gpu-role-llm: "true"
          sn.io/gpu-role: llm
        nodes: [sn-prod-k8s-01, sn-prod-k8s-02]
        physical_gpus: 4
        purpose: primary text/chat inference
        residency: always_on
      specialty:
        node_labels:
          isa.io/gpu-role-specialty: "true"
          sn.io/gpu-role: specialty
        nodes: [sn-prod-k8s-03]
        physical_gpus: 2
        purpose: embedding, rerank, STT, TTS, image engines
        residency: staged_or_elastic
      elastic:
        node_labels:
          isa.io/gpu-role-elastic: "true"
        nodes: [sn-prod-k8s-03]
        physical_gpus: 2
        purpose: batch, training, video, overflow
        residency: preemptible

    # Allocation policy — see ADR 0010. Cards are 96 GB Blackwell (no MIG, no
    # NVLink). Budget by VRAM, not by card count. Small latency-tolerant
    # specialty engines co-locate on one card via a single-container
    # (supervisord) bundle; the chat LLM and heavy generative engines stay on
    # dedicated cards. GPU-sharing plugins (MPS/time-slicing) are deferred until
    # a single-card micro-benchmark justifies them.
    allocation:
      strategy: vram_budgeted_colocation
      gpu_sharing_plugin: none            # MPS deferred — see ADR 0010 §3
      vllm_gpu_memory_utilization_cap: 0.5
      placement:
        sn-prod-k8s-01:
          gpu0: [qwen3.6-27b]             # dedicated, no cross-card TP
          gpu1: []                        # free → 2nd LLM / overflow
        sn-prod-k8s-02:                   # role → generative (see ADR 0010 §4)
          gpu0: [qwen-image-2.0]
          gpu1: [flux-2-schnell, wan-2.2]
        sn-prod-k8s-03:
          gpu0: [qwen3-embedding-8b]
          gpu1: [specialty-audio-bundle]  # whisper + qwen3-asr + kokoro + qwen3-tts + rerank

    scheduler_guardrails:
      node_local_gpu_indices_only: [0, 1]
      disable_flat_gpu_indices_for_sn: true
      physical_gpu_policy_requires_no_time_slicing: true   # MPS/time-slicing off until benchmarked
      no_cross_card_tensor_parallel: true                  # PCIe Gen5 only, no NVLink
      ray_gpu_workers_default_replicas: 0
      reason: >
        96 GB Blackwell cards (no MIG, no NVLink) make 1-model-per-card
        wasteful. Engines are placed by VRAM budget: the chat LLM and heavy
        generative engines hold dedicated cards (no cross-card TP — PCIe Gen5
        only), while small specialty engines (STT/TTS/rerank) share one card via
        a single-container supervisord bundle. GPU-sharing plugins are deferred:
        the k8s device-plugin MPS mode is experimental and isolation on
        workstation cards is soft, so MPS is adopted only after a single-card
        micro-benchmark. Ray GPU workers are elastic/batch capacity and must not
        keep specialty cards resident.

  models.yaml: |
    text:
      qwen3.6-27b:
        provider_key: isa
        engine: vllm
        deployment: vllm
        service: vllm
        served_model_name: qwen3.6-27b
        huggingface_id: Qwen/Qwen3.6-27B-FP8
        role_group: llm
        residency: always_on
        gpu_request: 1
        aliases:
          - Qwen/Qwen3.6-27B-FP8
          - Qwen/Qwen3.6-27B
          - qwen3.6-27b-fp8
          - qwen3.6-27b
        runtime_hints:
          reasoning_parser: qwen3
          chat_template_kwargs:
            enable_thinking: false

    embedding:
      qwen3-embedding-8b:
        provider_key: isa
        engine: vllm
        deployment: vllm-qwen3-embedding-8b
        service: vllm-qwen3-embedding-8b
        served_model_name: qwen3-embedding-8b
        huggingface_id: Qwen/Qwen3-Embedding-8B
        role_group: specialty
        residency: staged
        gpu_request: 1
        aliases:
          - text-embedding-3-large
          - text-embedding-3-small
          - text-embedding-ada-002
          - bge-large-en-v1.5
        runtime_hints:
          openai_endpoint: /v1/embeddings
          vllm_runner: pooling
          vllm_convert: embed
          native_dimensions: 4096
          alias_dimensions:
            text-embedding-3-small: 1536
            text-embedding-ada-002: 1536
            text-embedding-3-large: 3072
            bge-large-en-v1.5: 1024
          vllm_hf_overrides:
            is_matryoshka: true

    rerank:
      bge-reranker-v2-m3:
        provider_key: isa
        engine: triton
        deployment: triton-bge-reranker-v2-m3
        service: triton-bge-reranker-v2-m3
        huggingface_id: BAAI/bge-reranker-v2-m3
        role_group: specialty
        residency: staged
        gpu_request: 1
        aliases:
          - isa-jina-reranker-v2-service
          - sn-jina-reranker-v2-service

    # All audio engines target the specialty-audio-bundle (k8s-03 GPU1,
    # single-container co-location) per ADR 0010. kokoro ships first as a CPU
    # interim until the combined bundle image is built.
    audio:
      whisper-large-v3-turbo:
        provider_key: isa
        engine: faster-whisper
        deployment: faster-whisper-v3-turbo
        service: faster-whisper-v3-turbo
        huggingface_id: openai/whisper-large-v3-turbo
        role_group: specialty
        residency: bundled            # specialty-audio-bundle
        colocation_group: specialty-audio
        aliases: [whisper-1]
        runtime_hints:
          note: retained for 99-language coverage; qwen3-asr is the accuracy/speed default
      qwen3-asr-1.7b:
        provider_key: isa
        engine: vllm
        deployment: qwen3-asr
        service: qwen3-asr
        huggingface_id: Qwen/Qwen3-ASR-1.7B
        role_group: specialty
        residency: bundled
        colocation_group: specialty-audio
        aliases: [whisper-1, gpt-4o-transcribe]
        runtime_hints:
          openai_endpoint: /v1/audio/transcriptions
          sota: open ASR leader (2026-01) — accuracy, speed, timestamps, streaming
      kokoro:
        provider_key: isa
        engine: kokoro-fastapi
        deployment: kokoro-tts
        service: kokoro-tts
        huggingface_id: hexgrad/Kokoro-82M
        role_group: specialty
        residency: bundled
        colocation_group: specialty-audio
        interim_runtime: cpu          # GPU co-location once bundle image lands
        aliases: [tts-1]
        runtime_hints:
          openai_endpoint: /v1/audio/speech
          default_voice: af_nicole
      qwen3-tts:
        provider_key: isa
        engine: qwen-tts
        deployment: qwen3-tts
        service: qwen3-tts
        huggingface_id: Qwen/Qwen3-TTS
        role_group: specialty
        residency: bundled
        colocation_group: specialty-audio
        aliases: [tts-1-hd]
        runtime_hints:
          openai_endpoint: /v1/audio/speech
          note: multilingual HD tier; kokoro stays the fast tts-1 default
      fish-speech-s2:
        provider_key: isa
        engine: sglang
        role_group: specialty
        residency: staged             # alternative HD engine; qwen3-tts holds tts-1-hd
        aliases: []

    image:
      qwen-image-2.0:
        provider_key: isa
        engine: triton
        deployment: triton-qwen-image-2-0
        service: triton-qwen-image-2-0
        huggingface_id: Qwen/Qwen-Image
        role_group: specialty
        residency: staged
        runtime_hints:
          triton_model_name: qwen-image-2.0
          endpoint: /v2/models/qwen-image-2.0/infer
      flux-2-schnell:
        provider_key: isa
        engine: triton
        role_group: specialty
        residency: staged
        aliases: [flux-schnell]

    video:
      wan-2.2:
        provider_key: isa
        engine: triton
        role_group: elastic
        residency: preemptible
