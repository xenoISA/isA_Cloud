# Model Pre-Pull Job — downloads models before inference pods start
# Run after PVCs are created, before engine deployment
---
apiVersion: batch/v1
kind: Job
metadata:
  name: model-prepull-vllm
  namespace: isa-cloud-production
  labels:
    app: model-prepull
    engine: vllm
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: model-prepull
    spec:
      restartPolicy: OnFailure
      containers:
        - name: prepull
          image: python:3.12-slim
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              set -a
              source /config/models.env
              set +a
              pip install huggingface_hub
              python -c "
              from huggingface_hub import snapshot_download
              import os
              revision = os.environ.get('VLLM_MODEL_REVISION', 'main')
              raw_models = os.environ.get('MODEL_PREPULL_IDS') or os.environ.get('VLLM_MODEL_ID', 'Qwen/Qwen3.6-27B-FP8')
              model_ids = [item.strip() for item in raw_models.replace(';', ',').split(',') if item.strip()]
              for model_id in model_ids:
                  print(f'Downloading {model_id}@{revision}...')
                  snapshot_download(model_id, revision=revision, cache_dir='/models')
              print(f'Download complete: {len(model_ids)} model(s).')
              "
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: token
                  optional: true
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: model-registry
              mountPath: /config/models.env
              subPath: models.env
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-vllm
        - name: model-registry
          configMap:
            name: model-registry
