# Model Pre-Pull Job — downloads models before inference pods start
# Run after PVCs are created, before engine deployment
---
apiVersion: batch/v1
kind: Job
metadata:
  name: model-prepull-vllm
  namespace: isa-cloud-production
  labels:
    app: model-prepull
    engine: vllm
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: model-prepull
    spec:
      restartPolicy: OnFailure
      containers:
        - name: prepull
          image: python:3.12-slim
          command:
            - /bin/bash
            - -c
            - |
              pip install huggingface_hub
              python -c "
              from huggingface_hub import snapshot_download
              import os
              model_id = os.environ.get('MODEL_ID', 'meta-llama/Llama-3.1-8B-Instruct')
              revision = os.environ.get('MODEL_REVISION', 'main')
              print(f'Downloading {model_id}@{revision}...')
              snapshot_download(model_id, revision=revision, cache_dir='/models')
              print('Download complete.')
              "
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: model-registry
                  key: models.env
                  optional: true
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: token
                  optional: true
          volumeMounts:
            - name: model-cache
              mountPath: /models
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-vllm
