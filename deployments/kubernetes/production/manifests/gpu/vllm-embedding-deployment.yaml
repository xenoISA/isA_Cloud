# vLLM Production Runtime — Qwen3 Embedding 8B
#
# Staged local embedding runtime for the unified isA_Cloud production profile.
# This is a specialty role engine. Keep it off LLM role nodes so the primary
# Qwen3.6-27B pool can scale independently.
# The production deploy script rewrites namespace: isa-cloud-production to the
# requested NAMESPACE, e.g. sn-cloud-production for SN bootstrap deployments.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-embedding-runtime-config
  namespace: isa-cloud-production
  labels:
    app: vllm-qwen3-embedding-8b
    engine: vllm
data:
  MODEL_ID: "Qwen/Qwen3-Embedding-8B"
  SERVED_MODEL_NAME: "qwen3-embedding-8b"
  MAX_MODEL_LEN: "32768"
  GPU_MEMORY_UTILIZATION: "0.50"
  DTYPE: "auto"
  HF_OVERRIDES: '{"is_matryoshka": true}'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen3-embedding-8b
  namespace: isa-cloud-production
  labels:
    app: vllm-qwen3-embedding-8b
    engine: vllm
    isa-model/instance-group: specialty
    isa-model/model-id: qwen3-embedding-8b
spec:
  replicas: 1
  progressDeadlineSeconds: 3600
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-qwen3-embedding-8b
  template:
    metadata:
      labels:
        app: vllm-qwen3-embedding-8b
        engine: vllm
        isa-model/instance-group: specialty
        isa-model/model-id: qwen3-embedding-8b
    spec:
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: false
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: isa.io/gpu-role-specialty
                    operator: In
                    values: ["true"]
              - matchExpressions:
                  - key: sn.io/gpu-role
                    operator: In
                    values: ["specialty"]
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:cu130-nightly
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: vllm-embedding-runtime-config
                  key: MODEL_ID
            - name: SERVED_MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: vllm-embedding-runtime-config
                  key: SERVED_MODEL_NAME
            - name: MAX_MODEL_LEN
              valueFrom:
                configMapKeyRef:
                  name: vllm-embedding-runtime-config
                  key: MAX_MODEL_LEN
            - name: GPU_MEMORY_UTILIZATION
              valueFrom:
                configMapKeyRef:
                  name: vllm-embedding-runtime-config
                  key: GPU_MEMORY_UTILIZATION
            - name: DTYPE
              valueFrom:
                configMapKeyRef:
                  name: vllm-embedding-runtime-config
                  key: DTYPE
            - name: HF_OVERRIDES
              valueFrom:
                configMapKeyRef:
                  name: vllm-embedding-runtime-config
                  key: HF_OVERRIDES
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: token
                  optional: true
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: token
                  optional: true
            - name: HF_HOME
              value: /root/.cache/huggingface
            - name: VLLM_PORT
              value: "8000"
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -eu
              exec vllm serve "${MODEL_ID}" \
                --served-model-name "${SERVED_MODEL_NAME}" \
                --runner pooling \
                --convert embed \
                --max-model-len "${MAX_MODEL_LEN}" \
                --gpu-memory-utilization "${GPU_MEMORY_UTILIZATION}" \
                --dtype "${DTYPE}" \
                --hf-overrides "${HF_OVERRIDES}" \
                --trust-remote-code \
                --host 0.0.0.0 --port 8000
          resources:
            requests:
              cpu: "1000m"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4000m"
              memory: "24Gi"
              nvidia.com/gpu: "1"
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 300
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 900
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-embedding
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-qwen3-embedding-8b
  namespace: isa-cloud-production
  labels:
    app: vllm-qwen3-embedding-8b
    engine: vllm
spec:
  type: ClusterIP
  selector:
    app: vllm-qwen3-embedding-8b
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vllm-qwen3-embedding-8b
  namespace: isa-cloud-production
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app: vllm-qwen3-embedding-8b
