# Qwen3-ASR Production Runtime — Qwen/Qwen3-ASR-1.7B (STT)
#
# DRAFT / UNVERIFIED — authored from web research (June 2026), not yet
# applied or smoke-tested on any cluster.
#
# OpenAI-compatible STT runtime for `provider=isa, service_type=audio,
# task=transcribe`, serving the /v1/audio/transcriptions endpoint as the
# accuracy/speed default ahead of faster-whisper (which is retained for
# 99-language coverage). See local-inference-catalog.yaml models.yaml.
#
# SERVING PATH (turnkey, official):
#   vLLM ships first-party Qwen3-ASR support. The model is served with a plain
#   `vllm serve Qwen/Qwen3-ASR-1.7B`, which exposes the OpenAI Audio
#   Transcriptions API at /v1/audio/transcriptions on :8000 — the same image
#   (vllm/vllm-openai) and contract the chat LLM already uses, so this matches
#   house style (vllm-deployment.yaml). The `vllm[audio]` extra (ffmpeg/librosa
#   decode deps) is baked into the vllm-openai image as of the cu130 line.
#   Sources:
#     - https://docs.vllm.ai/projects/recipes/en/latest/Qwen/Qwen3-ASR.html
#     - https://docs.vllm.ai/en/latest/contributing/model/transcription/
#     - https://huggingface.co/Qwen/Qwen3-ASR-1.7B
#     - https://github.com/QwenLM/Qwen3-ASR
#   A community OpenAI-compatible wrapper image also exists if a thinner runtime
#   is preferred (ghcr.io/malaiwah/qwen3-asr-server:latest,
#   https://github.com/malaiwah/qwen3-asr-server) — NOT used here; we stay on
#   the official vLLM image for supply-chain hygiene.
#
# PLACEMENT: specialty group, k8s-03, 24 GB MPS slice (ADR 0010). Model is
# 1.7B (~4 GB fp16 weights); --gpu-memory-utilization is capped low so it fits
# a 24 GB slice alongside the rest of the specialty-audio pack. Pod requests
# nvidia.com/gpu: 1 (MPS renameByDefault=false -> one slice).
#
# The production deploy script rewrites namespace: isa-cloud-production to the
# requested NAMESPACE, e.g. sn-cloud-production for SN bootstrap deployments.
#
# RISK / UNKNOWN: vLLM's transcription endpoint maturity for Qwen3-ASR (vs
# Whisper) — streaming + word timestamps are advertised but the OpenAI-shaped
# verbose_json timestamp fields should be smoke-tested before cutting traffic
# off faster-whisper. gpu_memory_utilization vs the shared MPS slice budget
# needs a live check.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-qwen3-asr
  namespace: isa-cloud-production
  labels:
    app: qwen3-asr
    isa-model/model-id: qwen3-asr-1.7b
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 40Gi
  storageClassName: local-replica2-delay-bind
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qwen3-asr-config
  namespace: isa-cloud-production
  labels:
    app: qwen3-asr
    engine: vllm
data:
  MODEL_ID: "Qwen/Qwen3-ASR-1.7B"
  SERVED_MODEL_NAME: "qwen3-asr-1.7b"
  # Keep well under the 24 GB MPS slice: 1.7B weights are ~4 GB; the rest is
  # KV cache + audio buffers. 0.5 mirrors the catalog vllm cap.
  GPU_MEMORY_UTILIZATION: "0.45"
  MAX_MODEL_LEN: "4096"
  MAX_NUM_SEQS: "8"
  KV_CACHE_DTYPE: "fp8"
  DTYPE: "bfloat16"
  PORT: "8000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-asr
  namespace: isa-cloud-production
  labels:
    app: qwen3-asr
    engine: vllm
    isa-model/instance-group: specialty
    isa-model/model-id: qwen3-asr-1.7b
spec:
  replicas: 1
  progressDeadlineSeconds: 2400
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qwen3-asr
  template:
    metadata:
      labels:
        app: qwen3-asr
        engine: vllm
        isa-model/instance-group: specialty
        isa-model/model-id: qwen3-asr-1.7b
    spec:
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: false
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: isa.io/gpu-role-specialty
                    operator: In
                    values: ["true"]
              - matchExpressions:
                  - key: sn.io/gpu-role
                    operator: In
                    values: ["specialty"]
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:cu130-nightly
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: qwen3-asr-config
                  key: MODEL_ID
            - name: SERVED_MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: qwen3-asr-config
                  key: SERVED_MODEL_NAME
            - name: GPU_MEMORY_UTILIZATION
              valueFrom:
                configMapKeyRef:
                  name: qwen3-asr-config
                  key: GPU_MEMORY_UTILIZATION
            - name: MAX_MODEL_LEN
              valueFrom:
                configMapKeyRef:
                  name: qwen3-asr-config
                  key: MAX_MODEL_LEN
            - name: MAX_NUM_SEQS
              valueFrom:
                configMapKeyRef:
                  name: qwen3-asr-config
                  key: MAX_NUM_SEQS
            - name: KV_CACHE_DTYPE
              valueFrom:
                configMapKeyRef:
                  name: qwen3-asr-config
                  key: KV_CACHE_DTYPE
            - name: DTYPE
              valueFrom:
                configMapKeyRef:
                  name: qwen3-asr-config
                  key: DTYPE
            - name: HF_HOME
              value: /root/.cache/huggingface
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: token
                  optional: true
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: token
                  optional: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              exec vllm serve "${MODEL_ID}" \
                --served-model-name "${SERVED_MODEL_NAME}" \
                --gpu-memory-utilization "${GPU_MEMORY_UTILIZATION}" \
                --max-model-len "${MAX_MODEL_LEN}" \
                --max-num-seqs "${MAX_NUM_SEQS}" \
                --kv-cache-dtype "${KV_CACHE_DTYPE}" \
                --dtype "${DTYPE}" \
                --host 0.0.0.0 --port 8000
          resources:
            requests:
              cpu: "2000m"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "6000m"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 240
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-qwen3-asr
---
apiVersion: v1
kind: Service
metadata:
  name: qwen3-asr
  namespace: isa-cloud-production
  labels:
    app: qwen3-asr
    engine: vllm
spec:
  type: ClusterIP
  selector:
    app: qwen3-asr
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: qwen3-asr
  namespace: isa-cloud-production
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app: qwen3-asr
