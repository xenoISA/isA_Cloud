# Triton Engine — Wan2.2 text/image-to-video on `elastic` GPU group
#
# DRAFT / UNVERIFIED — authored from web research (June 2026), NOT yet applied
# or smoke-tested on any cluster. The synchronous scaffold below is a SHAPE
# PLACEHOLDER: real use needs an async/queue front end (see ASYNC note).
#
# !!! HARD CONSTRAINT: BLACKWELL sm_120 !!!
#   Nodes are NVIDIA RTX PRO 6000 Blackwell (sm_120, compute cap 12.0). torch +
#   CUDA MUST be CUDA 12.8+/sm_120-capable or kernels die with "no kernel image
#   is available for execution on the device".
#   - Base image is a CUDA-13 Triton tag (nvcr.io/nvidia/tritonserver:25.10-py3,
#     CUDA 13.0.2, Ubuntu 24.04, Python 3.12, compute cap 7.5+ incl. Blackwell).
#     The OLD 24.01-py3 (CUDA 12.3) has NO Blackwell kernels and MUST NOT be used.
#   - The startup pip step force-installs torch from the cu128 wheel index so the
#     diffusers install cannot pull a non-Blackwell torch. cu128 = sm_120 floor.
#   Source: https://docs.nvidia.com/deeplearning/triton-inference-server/release-notes/rel-25-10.html
#           https://download.pytorch.org/whl/cu128
#
# !!! ASYNC SHAPE REQUIRED FOR REAL USE !!!
#   Wan2.2-TI2V-5B generates a 5s 720p@24fps clip in ~9 min on a single 4090
#   (longer with no optimization). A synchronous Triton /v2/.../infer call WILL
#   exceed normal HTTP/gRPC client timeouts. This manifest keeps the synchronous
#   wrapper only as a working scaffold — production MUST front it with a job
#   queue (submit -> poll -> fetch MP4), e.g. a request table + worker, or route
#   video jobs through the platform's async task path. Do NOT wire this to a
#   synchronous user-facing route as-is.
#
# SERVING PATH: NO turnkey OpenAI/Triton image exists for Wan2.2. There is,
# however, a clean officially-supported diffusers path: Wan2.2 (T2V, I2V, TI2V)
# is integrated into HuggingFace `diffusers` via `WanPipeline` /
# `WanImageToVideoPipeline`. We reuse the Triton Python-backend + diffusers
# strategy from triton-qwen-image-2-0, swapping the image output for an MP4
# (frames -> diffusers.utils.export_to_video, returned base64). NOTE: the VAE
# (AutoencoderKLWan) must be loaded SEPARATELY in float32 — loading it at
# bf16 with the transformer produces garbage / NaNs. DRAFT scaffold only.
#   Sources:
#     - https://github.com/Wan-Video/Wan2.2
#     - https://huggingface.co/docs/diffusers/api/pipelines/wan
#     - https://huggingface.co/Wan-AI/Wan2.2-TI2V-5B-Diffusers
#     - https://huggingface.co/Wan-AI/Wan2.2-T2V-A14B-Diffusers
#
# VARIANT CHOICE: defaults to Wan-AI/Wan2.2-TI2V-5B-Diffusers — the 5B dense
# TI2V model does both text- and image-to-video at 720p@24fps. Model card says
# 27+ GB VRAM for basic generation (24 GB recommended floor). The A14B MoE
# (T2V/I2V) is higher quality but needs 40-80 GB depending on res/precision and
# will NOT fit. See docs/runbooks/new-model-runtimes-research.md. License is
# Apache-2.0; the repo is NOT gated, so HF_TOKEN is optional here.
#
# PLACEMENT: elastic group (ADR 0010, residency: preemptible). Video is batch /
# overflow capacity and must NOT keep a specialty card resident. The node
# affinity targets the elastic role label only; this pod is expected to be
# preempted. Pod requests nvidia.com/gpu: 1.
#   DEPENDENCY: the elastic role label (isa.io/gpu-role-elastic) currently lands
#   on k8s-03 only (gpu-node-labels.yaml). If video should run on a generative
#   card, that needs the k8s-02 relabel (see flux manifest header) — reconcile
#   with the ADR owner.
#
# The production deploy script rewrites namespace: isa-cloud-production to the
# requested NAMESPACE, e.g. sn-cloud-production.
#
# RISK / UNKNOWN:
#   - BLACKWELL: unverified until a pod renders on sm_120. cu128 torch install
#     below is the guard; confirm device_capability (12, 0) in pod logs.
#   - ASYNC: synchronous infer will time out for real clips — see ASYNC note.
#   - VRAM: 27+ GB on a 24 GB MPS slice means TI2V-5B likely OOMs at default
#     704x1280x121f. Mitigations baked into the wrapper: VAE float32 +
#     enable_model_cpu_offload + vae.enable_tiling(). May still need a larger
#     (48 GB) slice or fewer frames. The A14B variant will NOT fit a 24 GB slice.
#   - diffusers Wan2.2 TI2V-5B needs features that (as of the model card) live on
#     the diffusers MAIN branch — a tagged release may lag. Pin/verify before
#     baking; the manifest installs a recent tagged diffusers and will need a
#     git-main fallback if the pipeline import fails.
#   - export_to_video needs ffmpeg — imageio-ffmpeg is added to the startup pip
#     install; verify it resolves a working ffmpeg binary in the Triton image.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: triton-wan-2-2-config
  namespace: isa-cloud-production
  labels:
    isa-model/model-id: "wan-2.2"
    isa-model/instance-group: "elastic"
data:
  MODEL_ID: "Wan-AI/Wan2.2-TI2V-5B-Diffusers"
  MODEL_NAME: "wan-2-2"
  MODEL_REPOSITORY: "/models"
  BACKEND: "python"
  INSTANCE_COUNT: "1"
  INSTANCE_KIND: "KIND_GPU"
  # Model-card defaults for TI2V-5B: 720p (704x1280), 121 frames, 24 fps,
  # 50 steps, guidance 5.0. Lower num_frames if VRAM forces it (see header).
  DEFAULT_HEIGHT: "704"
  DEFAULT_WIDTH: "1280"
  DEFAULT_NUM_FRAMES: "121"
  DEFAULT_FPS: "24"
  DEFAULT_NUM_INFERENCE_STEPS: "50"
  DEFAULT_GUIDANCE_SCALE: "5.0"
  DTYPE: "bfloat16"
  LOG_VERBOSE: "1"
  CONFIG_PBTXT: |
    name: "wan-2-2"
    backend: "python"
    max_batch_size: 0
    input [
      {
        name: "prompt"
        data_type: TYPE_STRING
        dims: [ 1 ]
      },
      {
        name: "negative_prompt"
        data_type: TYPE_STRING
        dims: [ 1 ]
        optional: true
      },
      {
        name: "height"
        data_type: TYPE_INT32
        dims: [ 1 ]
        optional: true
      },
      {
        name: "width"
        data_type: TYPE_INT32
        dims: [ 1 ]
        optional: true
      },
      {
        name: "num_frames"
        data_type: TYPE_INT32
        dims: [ 1 ]
        optional: true
      },
      {
        name: "num_inference_steps"
        data_type: TYPE_INT32
        dims: [ 1 ]
        optional: true
      },
      {
        name: "guidance_scale"
        data_type: TYPE_FP32
        dims: [ 1 ]
        optional: true
      },
      {
        name: "fps"
        data_type: TYPE_INT32
        dims: [ 1 ]
        optional: true
      },
      {
        name: "seed"
        data_type: TYPE_INT64
        dims: [ 1 ]
        optional: true
      }
    ]
    output [
      {
        name: "video"
        data_type: TYPE_STRING
        dims: [ 1 ]
      }
    ]
    instance_group [
      {
        count: 1
        kind: KIND_GPU
      }
    ]
  # No EXECUTION_ENV_PATH — startup pip-installs into system python; the python
  # backend uses the default interpreter (a missing packed python_env path
  # crashed qwen-image with "Failed to get the canonical path").
  CONFIG_PY: |
    """Triton Python backend wrapper for Wan2.2 text-to-video via diffusers.

    DRAFT: returns a base64-encoded MP4. Long-running — see header note on
    timeouts / preferring an async job shape over synchronous infer.
    """
    import base64
    import os
    import tempfile

    import numpy as np
    import torch
    import triton_python_backend_utils as pb_utils
    from diffusers import AutoencoderKLWan, WanPipeline
    from diffusers.utils import export_to_video


    class TritonPythonModel:
        def initialize(self, args):
            self.model_id = os.environ.get(
                "MODEL_ID", "Wan-AI/Wan2.2-TI2V-5B-Diffusers"
            )
            # BLACKWELL: surface torch/cuda/device capability immediately.
            if torch.cuda.is_available():
                cap = torch.cuda.get_device_capability()
                print(f"[wan2.2] torch {torch.__version__} "
                      f"cuda {torch.version.cuda} device_capability {cap}",
                      flush=True)
            self.default_height = int(os.environ.get("DEFAULT_HEIGHT", "704"))
            self.default_width = int(os.environ.get("DEFAULT_WIDTH", "1280"))
            self.default_frames = int(os.environ.get("DEFAULT_NUM_FRAMES", "121"))
            self.default_fps = int(os.environ.get("DEFAULT_FPS", "24"))
            self.default_steps = int(
                os.environ.get("DEFAULT_NUM_INFERENCE_STEPS", "50")
            )
            self.default_guidance = float(
                os.environ.get("DEFAULT_GUIDANCE_SCALE", "5.0")
            )
            dtype = (
                torch.bfloat16
                if os.environ.get("DTYPE", "bfloat16") == "bfloat16"
                else torch.float16
            )
            # The Wan VAE MUST be loaded in float32 — bf16 produces NaNs/garbage.
            vae = AutoencoderKLWan.from_pretrained(
                self.model_id, subfolder="vae", torch_dtype=torch.float32
            )
            self.pipe = WanPipeline.from_pretrained(
                self.model_id, vae=vae, torch_dtype=dtype
            )
            # VRAM mitigations for the 27+ GB model on a tight slice (see header):
            # CPU offload keeps only the active module resident; tiled VAE decode
            # avoids a large decode-time spike. Trades latency for headroom.
            self.pipe.enable_model_cpu_offload()
            try:
                self.pipe.vae.enable_tiling()
            except Exception:
                pass
            self.pipe.set_progress_bar_config(disable=True)

        def _scalar(self, request, name, default, cast):
            tensor = pb_utils.get_input_tensor_by_name(request, name)
            if tensor is None:
                return default
            return cast(tensor.as_numpy().reshape(-1)[0])

        def execute(self, requests):
            responses = []
            for request in requests:
                prompt_arr = pb_utils.get_input_tensor_by_name(
                    request, "prompt"
                ).as_numpy()
                prompt = prompt_arr.reshape(-1)[0]
                if isinstance(prompt, bytes):
                    prompt = prompt.decode("utf-8")

                negative = self._scalar(
                    request,
                    "negative_prompt",
                    "",
                    lambda v: v.decode("utf-8") if isinstance(v, bytes) else str(v),
                )
                height = self._scalar(request, "height", self.default_height, int)
                width = self._scalar(request, "width", self.default_width, int)
                num_frames = self._scalar(
                    request, "num_frames", self.default_frames, int
                )
                steps = self._scalar(
                    request, "num_inference_steps", self.default_steps, int
                )
                guidance = self._scalar(
                    request, "guidance_scale", self.default_guidance, float
                )
                fps = self._scalar(request, "fps", self.default_fps, int)
                seed = self._scalar(request, "seed", -1, int)

                generator = None
                if seed >= 0:
                    generator = torch.Generator(device="cuda").manual_seed(seed)

                result = self.pipe(
                    prompt=prompt,
                    negative_prompt=negative or None,
                    height=height,
                    width=width,
                    num_frames=num_frames,
                    num_inference_steps=steps,
                    guidance_scale=guidance,
                    generator=generator,
                )
                frames = result.frames[0]
                with tempfile.NamedTemporaryFile(suffix=".mp4") as tmp:
                    export_to_video(frames, tmp.name, fps=fps)
                    tmp.seek(0)
                    encoded = base64.b64encode(tmp.read()).decode("ascii")

                out_tensor = pb_utils.Tensor(
                    "video", np.array([encoded], dtype=object)
                )
                responses.append(pb_utils.InferenceResponse([out_tensor]))
            return responses

        def finalize(self):
            del self.pipe
            torch.cuda.empty_cache()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-wan-2-2
  namespace: isa-cloud-production
  labels:
    app: triton-wan-2-2
    engine: triton
    isa-model/model-id: "wan-2.2"
    isa-model/instance-group: "elastic"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triton-wan-2-2
  template:
    metadata:
      labels:
        app: triton-wan-2-2
        engine: triton
        isa-model/model-id: "wan-2.2"
        isa-model/instance-group: "elastic"
    spec:
      securityContext:
        runAsNonRoot: false
      containers:
        - name: triton
          # Blackwell sm_120 needs CUDA 12.8+. 25.10-py3 ships CUDA 13.0.2 +
          # Ubuntu 24.04 + Python 3.12, supports compute cap 7.5+ (incl.
          # Blackwell). The old 24.01-py3 (CUDA 12.3) has NO Blackwell kernels.
          # Mirror to Harbor first (see /tmp/mirror-wan-base.yaml — shares the
          # same Triton base as flux), then flip to
          # core.harbor.domain/isa/tritonserver:25.10-py3.
          image: core.harbor.domain/isa/tritonserver:25.12-py3
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8001
              name: grpc
            - containerPort: 8002
              name: metrics
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: triton-wan-2-2-config
                  key: MODEL_ID
            - name: MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: triton-wan-2-2-config
                  key: MODEL_NAME
            - name: MODEL_REPOSITORY
              valueFrom:
                configMapKeyRef:
                  name: triton-wan-2-2-config
                  key: MODEL_REPOSITORY
            - name: DEFAULT_HEIGHT
              valueFrom:
                configMapKeyRef:
                  name: triton-wan-2-2-config
                  key: DEFAULT_HEIGHT
            - name: DEFAULT_WIDTH
              valueFrom:
                configMapKeyRef:
                  name: triton-wan-2-2-config
                  key: DEFAULT_WIDTH
            - name: DEFAULT_NUM_FRAMES
              valueFrom:
                configMapKeyRef:
                  name: triton-wan-2-2-config
                  key: DEFAULT_NUM_FRAMES
            - name: DEFAULT_FPS
              valueFrom:
                configMapKeyRef:
                  name: triton-wan-2-2-config
                  key: DEFAULT_FPS
            - name: DEFAULT_NUM_INFERENCE_STEPS
              valueFrom:
                configMapKeyRef:
                  name: triton-wan-2-2-config
                  key: DEFAULT_NUM_INFERENCE_STEPS
            - name: DEFAULT_GUIDANCE_SCALE
              valueFrom:
                configMapKeyRef:
                  name: triton-wan-2-2-config
                  key: DEFAULT_GUIDANCE_SCALE
            - name: DTYPE
              valueFrom:
                configMapKeyRef:
                  name: triton-wan-2-2-config
                  key: DTYPE
            - name: HF_HOME
              value: "/root/.cache/huggingface"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: token
                  optional: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              mkdir -p "$MODEL_REPOSITORY/$MODEL_NAME/1"
              if [ ! -f "$MODEL_REPOSITORY/$MODEL_NAME/config.pbtxt" ]; then
                cp /etc/triton-config/config.pbtxt \
                  "$MODEL_REPOSITORY/$MODEL_NAME/config.pbtxt"
              fi
              if [ ! -f "$MODEL_REPOSITORY/$MODEL_NAME/1/model.py" ]; then
                cp /etc/triton-config/model.py \
                  "$MODEL_REPOSITORY/$MODEL_NAME/1/model.py"
              fi
              # BLACKWELL sm_120: force the cu128 torch wheel FIRST so diffusers
              # cannot drag in a CPU/old-CUDA torch. cu128 carries sm_120 kernels.
              pip install --no-cache-dir \
                --index-url https://download.pytorch.org/whl/cu128 \
                "torch>=2.7" "torchvision>=0.22"
              # Wan2.2 TI2V-5B may require diffusers main; install a recent tag
              # and fall back to git-main if WanPipeline/AutoencoderKLWan import
              # or model load fails (verify against the model card before baking).
              # imageio-ffmpeg provides export_to_video's mux backend.
              pip install --no-cache-dir \
                "diffusers>=0.36" \
                "transformers>=4.57" \
                "accelerate>=1.0" \
                "safetensors>=0.4" \
                "imageio-ffmpeg>=0.5" \
                "ftfy>=6.1"
              exec tritonserver \
                --model-repository="$MODEL_REPOSITORY" \
                --strict-model-config=true \
                --log-verbose=1 \
                --allow-http=true \
                --allow-grpc=true \
                --http-port=8000 \
                --grpc-port=8001 \
                --metrics-port=8002
          resources:
            requests:
              memory: "32Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
            limits:
              memory: "48Gi"
              cpu: "8"
              nvidia.com/gpu: "1"
          # startupProbe gates liveness during the slow cold start (cu128 pip +
          # large HF download + load). 60 + 240*15 = ~60 min (video weights are
          # large). Prevents the 9-min liveness SIGKILL seen on qwen-image.
          startupProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 240
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 6
          volumeMounts:
            - name: model-repository
              mountPath: /models
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: triton-config
              mountPath: /etc/triton-config
              readOnly: true
      volumes:
        - name: model-repository
          persistentVolumeClaim:
            claimName: triton-wan-2-2-repo
        - name: model-cache
          persistentVolumeClaim:
            claimName: triton-wan-2-2-cache
        - name: triton-config
          configMap:
            name: triton-wan-2-2-config
            items:
              - key: CONFIG_PBTXT
                path: config.pbtxt
              - key: CONFIG_PY
                path: model.py
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: isa.io/gpu-role-generative
                    operator: In
                    values: ["true"]
              - matchExpressions:
                  - key: sn.io/gpu-role
                    operator: In
                    values: ["generative"]
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: triton-wan-2-2
  namespace: isa-cloud-production
  labels:
    app: triton-wan-2-2
    isa-model/model-id: "wan-2.2"
    isa-model/instance-group: "elastic"
spec:
  selector:
    app: triton-wan-2-2
  ports:
    - port: 8000
      targetPort: 8000
      name: http
    - port: 8001
      targetPort: 8001
      name: grpc
    - port: 8002
      targetPort: 8002
      name: metrics
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: triton-wan-2-2-repo
  namespace: isa-cloud-production
  labels:
    isa-model/model-id: "wan-2.2"
    isa-model/instance-group: "elastic"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: local-replica2-delay-bind
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: triton-wan-2-2-cache
  namespace: isa-cloud-production
  labels:
    isa-model/model-id: "wan-2.2"
    isa-model/instance-group: "elastic"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 120Gi
  storageClassName: local-replica2-delay-bind
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: triton-wan-2-2
  namespace: isa-cloud-production
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app: triton-wan-2-2
