# Triton Engine — Qwen Image 2.0 on `generative` GPU group (k8s-02) (#956)
#
# DRAFT / UNVERIFIED — Blackwell-safe rework authored from web research
# (June 2026), NOT yet applied or smoke-tested on any cluster. The Blackwell
# compatibility below is reasoned from NVIDIA/PyTorch/diffusers docs, not from a
# live run. Smoke-test on a real RTX PRO 6000 (sm_120) node before relying on it.
#
# !!! BLACKWELL HARD REQUIREMENT (sm_120) !!!
#   The SN production GPUs are NVIDIA RTX PRO 6000 Blackwell (compute
#   capability sm_120). ANY torch/CUDA that touches the GPU — baked into the
#   base image OR pip-installed by this python backend at startup — MUST carry
#   sm_120 kernels (CUDA 12.8+ / torch 2.7+cu128). An older torch (e.g. the one
#   in tritonserver:24.01-py3) crashes at first CUDA call with
#   "CUDA error: no kernel image is available for execution on the device".
#   This manifest addresses that two ways, belt-and-suspenders:
#     1. Base image bumped 24.01 -> 25.12-py3. The 25.x Triton line supports
#        Blackwell (since 25.01) and 25.12 ships CUDA 13.1 — sm_120 capable.
#     2. The startup pip install PINS torch/torchvision to a cu128 build from
#        the PyTorch cu128 index, so the diffusion pipeline runs on a torch
#        that definitely has sm_120 kernels regardless of what the base bundles.
#   Sources:
#     - Triton 25.12 release notes (CUDA 13.1, Blackwell / cc 7.5+):
#       https://docs.nvidia.com/deeplearning/triton-inference-server/release-notes/rel-25-12.html
#     - Triton 25.01 added Blackwell support:
#       https://docs.nvidia.com/deeplearning/triton-inference-server/release-notes/rel-25-02.html
#     - CUDA 12.8 adds sm_120 (Blackwell):
#       https://forums.developer.nvidia.com/t/cuda-toolkit-12-8-what-gpu-is-sm-120/322128
#     - torch cu128 for sm_120 (RTX Blackwell):
#       https://download.pytorch.org/whl/cu128
#
# Replaces Replicate-hosted image generation (flux-schnell, flux-kontext-pro,
# sticker-maker, face-swap) with a self-managed Qwen Image 2.0 pod served via
# Triton's Python backend over the `diffusers` library. Qwen Image is the
# current open-weight SOTA for text-to-image (Apache 2.0, DPG-Bench 88.32 vs
# FLUX.1 83.84, leads AI Arena, and notably renders in-image text — its
# headline differentiator over FLUX). FLUX.2 klein co-tenants on the same
# generative node for the speed/preview tier (see triton-flux-2-schnell.yaml).
#
# Sizing notes (k8s-02 generative, 96 GB RTX PRO 6000 Blackwell, MPS):
#   - Qwen Image 2.0 weights: ~24 GB at bf16 (ADR 0010 budgets ~40 GB working).
#   - Placement is one 48 GB MPS slice on k8s-02 (2 slices/card per ADR 0010).
#     Co-tenants on k8s-02: FLUX.2 klein + Wan2.2 (each its own 48 GB slice).
#   - Memory limit 32 Gi RAM is sized for bf16 weights + working set; the GPU
#     request of "1" maps to ONE MPS slice (renameByDefault=false), not a whole
#     card — co-tenancy is via MPS, NOT MIG/NVLink.
#   - INSTANCE_COUNT=1 — diffusion pipelines are not safe to share a CUDA
#     context across workers. Throughput comes from batching latents inside
#     the pipeline, not from parallel instances.
#
# Backend choice: Triton Python backend wrapping HuggingFace `diffusers`.
#   Triton has no stock diffusers/text-to-image backend. The Python backend
#   lets us load `QwenImagePipeline` (or `DiffusionPipeline.from_pretrained`)
#   once at startup, then expose a standard Triton inference signature:
#     in:  prompt (BYTES), height/width (INT32), steps (INT32), guidance (FP32)
#     out: image (BYTES — PNG or WEBP encoded)
#   diffusers has shipped Qwen-Image (QwenImagePipeline) since day 0; the model
#   card's own example uses it. DiffusionPipeline.from_pretrained auto-resolves
#   to QwenImagePipeline for Qwen/Qwen-Image. Verify the pinned diffusers
#   release actually contains QwenImagePipeline before baking an image. Sources:
#     - https://huggingface.co/docs/diffusers/main/en/api/pipelines/qwenimage
#     - https://huggingface.co/Qwen/Qwen-Image
#   The model.py wrapper is materialised from CONFIG_PY at pod startup;
#   weights download lazily on first request from the HF cache mounted at
#   /root/.cache/huggingface (PVC-backed for warm restarts).
#
# Container strategy: base `nvcr.io/nvidia/tritonserver:25.12-py3` (CUDA 13.1,
# Blackwell-capable) + a startup pip install that PINS a cu128 torch plus the
# diffusers stack. A custom-built image with the deps + weights baked in is
# faster on cold boot and is what production should ship; the startup pip
# install is the bootstrap/portable form and trades cold-boot speed for image
# hygiene. NOTE: the 25.12-py3 base must be mirrored into Harbor first
# (see /tmp/mirror-qwen-image-base.yaml) — the cluster pulls from
# core.harbor.domain/isa, not nvcr.io.
#
# Model repository layout:
#   /models/qwen-image-2.0/
#     config.pbtxt            # generated from CONFIG_PBTXT below
#     1/
#       model.py              # generated from CONFIG_PY below
#
# Apply with:
#   kubectl apply -f deployment/k8s/engines/triton-qwen-image-2.0.yaml
#
# Health:
#   kubectl -n isa-engines get pods -l app=triton-qwen-image-2-0
#   kubectl -n isa-engines port-forward svc/triton-qwen-image-2-0 8000:8000 &
#   curl http://localhost:8000/v2/health/ready
#   curl http://localhost:8000/v2/models/qwen-image-2.0
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: triton-qwen-image-2-0-config
  namespace: isa-cloud-production
  labels:
    isa-model/model-id: "qwen-image-2.0"
    isa-model/instance-group: "generative"
data:
  MODEL_ID: "Qwen/Qwen-Image"
  MODEL_NAME: "qwen-image-2.0"
  MODEL_REPOSITORY: "/models"
  BACKEND: "python"
  INSTANCE_COUNT: "1"
  INSTANCE_KIND: "KIND_GPU"
  # Scheduler: Qwen Image ships with a flow-matching scheduler by default.
  # Override to the DPM++ Karras family if quality tuning demands it.
  SCHEDULER: "default"
  # Default inference parameters — clients can override per request.
  DEFAULT_HEIGHT: "1024"
  DEFAULT_WIDTH: "1024"
  DEFAULT_NUM_INFERENCE_STEPS: "50"
  DEFAULT_GUIDANCE_SCALE: "7.5"
  # Output: PNG (lossless, default) or WEBP (smaller, slightly lossy).
  OUTPUT_FORMAT: "PNG"
  # Resolution cap — clients requesting larger will be clamped.
  MAX_HEIGHT: "1536"
  MAX_WIDTH: "1536"
  DTYPE: "bfloat16"
  LOG_VERBOSE: "1"
  # Triton config.pbtxt for the Python backend. The Python backend ignores
  # `max_batch_size > 0` for non-tensor inputs, so we keep the pipeline
  # single-request and rely on the diffusion scheduler for latent batching.
  CONFIG_PBTXT: |
    name: "qwen-image-2.0"
    backend: "python"
    max_batch_size: 0
    input [
      {
        name: "prompt"
        data_type: TYPE_STRING
        dims: [ 1 ]
      },
      {
        name: "negative_prompt"
        data_type: TYPE_STRING
        dims: [ 1 ]
        optional: true
      },
      {
        name: "height"
        data_type: TYPE_INT32
        dims: [ 1 ]
        optional: true
      },
      {
        name: "width"
        data_type: TYPE_INT32
        dims: [ 1 ]
        optional: true
      },
      {
        name: "num_inference_steps"
        data_type: TYPE_INT32
        dims: [ 1 ]
        optional: true
      },
      {
        name: "guidance_scale"
        data_type: TYPE_FP32
        dims: [ 1 ]
        optional: true
      },
      {
        name: "seed"
        data_type: TYPE_INT64
        dims: [ 1 ]
        optional: true
      }
    ]
    output [
      {
        name: "image"
        data_type: TYPE_STRING
        dims: [ 1 ]
      }
    ]
    instance_group [
      {
        count: 1
        kind: KIND_GPU
      }
    ]
  # NOTE: no EXECUTION_ENV_PATH — the startup script pip-installs torch
  # cu128 + diffusers into the system python, so the python backend uses the
  # default interpreter. (A packed python_env path was referenced before and
  # didn't exist → "Failed to get the canonical path for .../python_env".)
  # Python backend wrapper. Loads QwenImagePipeline at startup and routes
  # requests through it. Kept intentionally minimal — production should
  # split this into a vendored module and add structured logging + metrics.
  CONFIG_PY: |
    """Triton Python backend wrapper for Qwen Image 2.0 via diffusers."""
    import base64
    import io
    import json
    import os

    import numpy as np
    import torch
    import triton_python_backend_utils as pb_utils
    from diffusers import DiffusionPipeline


    class TritonPythonModel:
        def initialize(self, args):
            model_config = json.loads(args["model_config"])
            params = {
                p["key"]: p["value"]["string_value"]
                for p in model_config.get("parameters", [])
            }
            self.model_id = os.environ.get("MODEL_ID", "Qwen/Qwen-Image")
            self.default_height = int(os.environ.get("DEFAULT_HEIGHT", "1024"))
            self.default_width = int(os.environ.get("DEFAULT_WIDTH", "1024"))
            self.default_steps = int(
                os.environ.get("DEFAULT_NUM_INFERENCE_STEPS", "50")
            )
            self.default_guidance = float(
                os.environ.get("DEFAULT_GUIDANCE_SCALE", "7.5")
            )
            self.max_height = int(os.environ.get("MAX_HEIGHT", "1536"))
            self.max_width = int(os.environ.get("MAX_WIDTH", "1536"))
            self.output_format = os.environ.get("OUTPUT_FORMAT", "PNG").upper()
            dtype = (
                torch.bfloat16
                if os.environ.get("DTYPE", "bfloat16") == "bfloat16"
                else torch.float16
            )
            self.pipe = DiffusionPipeline.from_pretrained(
                self.model_id, torch_dtype=dtype
            ).to("cuda")
            self.pipe.set_progress_bar_config(disable=True)

        def _scalar(self, request, name, default, cast):
            tensor = pb_utils.get_input_tensor_by_name(request, name)
            if tensor is None:
                return default
            return cast(tensor.as_numpy().reshape(-1)[0])

        def _clamp(self, value, ceiling):
            return min(int(value), int(ceiling))

        def execute(self, requests):
            responses = []
            for request in requests:
                prompt_arr = pb_utils.get_input_tensor_by_name(
                    request, "prompt"
                ).as_numpy()
                prompt = prompt_arr.reshape(-1)[0]
                if isinstance(prompt, bytes):
                    prompt = prompt.decode("utf-8")

                negative = self._scalar(
                    request,
                    "negative_prompt",
                    "",
                    lambda v: v.decode("utf-8") if isinstance(v, bytes) else str(v),
                )
                height = self._clamp(
                    self._scalar(request, "height", self.default_height, int),
                    self.max_height,
                )
                width = self._clamp(
                    self._scalar(request, "width", self.default_width, int),
                    self.max_width,
                )
                steps = self._scalar(
                    request, "num_inference_steps", self.default_steps, int
                )
                guidance = self._scalar(
                    request, "guidance_scale", self.default_guidance, float
                )
                seed = self._scalar(request, "seed", -1, int)

                generator = None
                if seed >= 0:
                    generator = torch.Generator(device="cuda").manual_seed(seed)

                result = self.pipe(
                    prompt=prompt,
                    negative_prompt=negative or None,
                    height=height,
                    width=width,
                    num_inference_steps=steps,
                    guidance_scale=guidance,
                    generator=generator,
                )
                image = result.images[0]
                buffer = io.BytesIO()
                image.save(buffer, format=self.output_format)
                encoded = base64.b64encode(buffer.getvalue()).decode("ascii")

                out_tensor = pb_utils.Tensor(
                    "image", np.array([encoded], dtype=object)
                )
                responses.append(pb_utils.InferenceResponse([out_tensor]))
            return responses

        def finalize(self):
            del self.pipe
            torch.cuda.empty_cache()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-qwen-image-2-0
  namespace: isa-cloud-production
  labels:
    app: triton-qwen-image-2-0
    engine: triton
    isa-model/model-id: "qwen-image-2.0"
    isa-model/instance-group: "generative"
spec:
  # One pod on the generative node (k8s-02) per ADR 0010, one 48 GB MPS slice.
  # Co-tenants on k8s-02: FLUX.2 klein (triton-flux-2-schnell) and Wan2.2.
  replicas: 1
  selector:
    matchLabels:
      app: triton-qwen-image-2-0
  template:
    metadata:
      labels:
        app: triton-qwen-image-2-0
        engine: triton
        isa-model/model-id: "qwen-image-2.0"
        isa-model/instance-group: "generative"
    spec:
      # Harbor pull secret — the base image is mirrored to core.harbor.domain.
      imagePullSecrets:
        - name: harbor-isa
      securityContext:
        runAsNonRoot: false
      containers:
        - name: triton
          # Blackwell-safe base: Triton 25.12-py3 ships CUDA 13.1 (sm_120).
          # Mirrored into Harbor (see /tmp/mirror-qwen-image-base.yaml); the
          # cluster cannot pull nvcr.io directly. Upstream:
          # nvcr.io/nvidia/tritonserver:25.12-py3
          image: core.harbor.domain/isa/tritonserver:25.12-py3
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8001
              name: grpc
            - containerPort: 8002
              name: metrics
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: triton-qwen-image-2-0-config
                  key: MODEL_ID
            - name: MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: triton-qwen-image-2-0-config
                  key: MODEL_NAME
            - name: MODEL_REPOSITORY
              valueFrom:
                configMapKeyRef:
                  name: triton-qwen-image-2-0-config
                  key: MODEL_REPOSITORY
            - name: BACKEND
              valueFrom:
                configMapKeyRef:
                  name: triton-qwen-image-2-0-config
                  key: BACKEND
            - name: INSTANCE_COUNT
              valueFrom:
                configMapKeyRef:
                  name: triton-qwen-image-2-0-config
                  key: INSTANCE_COUNT
            - name: INSTANCE_KIND
              valueFrom:
                configMapKeyRef:
                  name: triton-qwen-image-2-0-config
                  key: INSTANCE_KIND
            - name: SCHEDULER
              valueFrom:
                configMapKeyRef:
                  name: triton-qwen-image-2-0-config
                  key: SCHEDULER
            - name: DEFAULT_HEIGHT
              valueFrom:
                configMapKeyRef:
                  name: triton-qwen-image-2-0-config
                  key: DEFAULT_HEIGHT
            - name: DEFAULT_WIDTH
              valueFrom:
                configMapKeyRef:
                  name: triton-qwen-image-2-0-config
                  key: DEFAULT_WIDTH
            - name: DEFAULT_NUM_INFERENCE_STEPS
              valueFrom:
                configMapKeyRef:
                  name: triton-qwen-image-2-0-config
                  key: DEFAULT_NUM_INFERENCE_STEPS
            - name: DEFAULT_GUIDANCE_SCALE
              valueFrom:
                configMapKeyRef:
                  name: triton-qwen-image-2-0-config
                  key: DEFAULT_GUIDANCE_SCALE
            - name: OUTPUT_FORMAT
              valueFrom:
                configMapKeyRef:
                  name: triton-qwen-image-2-0-config
                  key: OUTPUT_FORMAT
            - name: MAX_HEIGHT
              valueFrom:
                configMapKeyRef:
                  name: triton-qwen-image-2-0-config
                  key: MAX_HEIGHT
            - name: MAX_WIDTH
              valueFrom:
                configMapKeyRef:
                  name: triton-qwen-image-2-0-config
                  key: MAX_WIDTH
            - name: DTYPE
              valueFrom:
                configMapKeyRef:
                  name: triton-qwen-image-2-0-config
                  key: DTYPE
            - name: HF_HOME
              value: "/root/.cache/huggingface"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: token
                  optional: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              # Materialise model.py + config.pbtxt into the model repo.
              # Idempotent across restarts so we don't clobber warm caches.
              mkdir -p "$MODEL_REPOSITORY/$MODEL_NAME/1"
              if [ ! -f "$MODEL_REPOSITORY/$MODEL_NAME/config.pbtxt" ]; then
                cp /etc/triton-config/config.pbtxt \
                  "$MODEL_REPOSITORY/$MODEL_NAME/config.pbtxt"
              fi
              if [ ! -f "$MODEL_REPOSITORY/$MODEL_NAME/1/model.py" ]; then
                cp /etc/triton-config/model.py \
                  "$MODEL_REPOSITORY/$MODEL_NAME/1/model.py"
              fi
              # BLACKWELL (sm_120) — install a cu128 torch FIRST, from the
              # PyTorch cu128 index, so the GPU kernels exist for RTX PRO 6000.
              # This must run before diffusers so pip does not pull a default
              # (non-cu128) torch wheel as a transitive dep. The 25.12 base is
              # already CUDA 13.x; pinning cu128 torch here is the belt to the
              # base image's suspenders and makes the GPU contract explicit.
              # Verify these exact pins resolve on the cu128 index before baking
              # a production image (torch/torchvision cu128 availability moves).
              pip install --no-cache-dir \
                --index-url https://download.pytorch.org/whl/cu128 \
                "torch==2.7.1+cu128" \
                "torchvision==0.22.1+cu128"
              # diffusers stack from PyPI. diffusers must be recent enough to
              # contain QwenImagePipeline (shipped day-0 for Qwen-Image); >=0.34
              # is a safe floor — verify against the release in use. --no-deps
              # is NOT used, but torch is already satisfied by the cu128 install
              # above so pip will not replace it.
              pip install --no-cache-dir \
                "diffusers>=0.34" \
                "transformers>=4.49" \
                "accelerate>=0.33" \
                "safetensors>=0.4" \
                "Pillow>=10.0"
              exec tritonserver \
                --model-repository="$MODEL_REPOSITORY" \
                --strict-model-config=true \
                --log-verbose=1 \
                --allow-http=true \
                --allow-grpc=true \
                --http-port=8000 \
                --grpc-port=8001 \
                --metrics-port=8002
          resources:
            requests:
              memory: "24Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
            limits:
              memory: "32Gi"
              cpu: "8"
              nvidia.com/gpu: "1"
          # Cold start dominated by HF weight download (~24 GB at fp16) plus
          # pip install. First boot can take 10+ minutes on a cold PVC;
          # warm restarts ~ 60-90s. Wide initialDelaySeconds + high
          # failureThreshold reflect that.
          # startupProbe gates liveness/readiness during the slow COLD start
          # (per-pod cu128 pip install + ~40 GB HF download + model load can be
          # 20-40 min). 60 + 200*15 = ~50 min budget. Liveness only begins after
          # this succeeds, so it can't prematurely SIGKILL the boot (the 9-min
          # kill we hit before). Warm restarts pass startup in ~60-90s.
          startupProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 200
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 6
          volumeMounts:
            - name: model-repository
              mountPath: /models
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: triton-config
              mountPath: /etc/triton-config
              readOnly: true
      volumes:
        - name: model-repository
          persistentVolumeClaim:
            claimName: triton-qwen-image-2-0-repo
        - name: model-cache
          persistentVolumeClaim:
            claimName: triton-qwen-image-2-0-cache
        - name: triton-config
          configMap:
            name: triton-qwen-image-2-0-config
            items:
              - key: CONFIG_PBTXT
                path: config.pbtxt
              - key: CONFIG_PY
                path: model.py
      # GENERATIVE-node affinity (k8s-02) per ADR 0010 — qwen-image lives on
      # the generative group, NOT specialty (k8s-03). The two nodeSelectorTerms
      # are OR'd, matching either label scheme (isa.io/* or sn.io/*).
      #
      # !!! RELABEL DEPENDENCY — k8s-02 is NOT relabeled generative yet !!!
      #   As of 2026-06-09 sn-prod-k8s-02 still carries sn.io/gpu-role=llm /
      #   isa.io/gpu-role-llm=true (it was an LLM pool member). This affinity
      #   will NOT schedule until k8s-02 is freed of the chat LLM and relabeled:
      #     kubectl label node sn-prod-k8s-02 \
      #       sn.io/gpu-role=generative isa.io/gpu-role-generative=true \
      #       isa.io/gpu-role-llm- --overwrite
      #   That relabel + LLM-consolidation-onto-k8s-01 is the gated step in
      #   ADR 0010 §Rollout and docs/runbooks/mps-fleet-repack.md. Do NOT apply
      #   this Deployment before k8s-02 is relabeled, or the pod stays Pending.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: isa.io/gpu-role-generative
                    operator: In
                    values: ["true"]
              - matchExpressions:
                  - key: sn.io/gpu-role
                    operator: In
                    values: ["generative"]
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: triton-qwen-image-2-0
  namespace: isa-cloud-production
  labels:
    app: triton-qwen-image-2-0
    isa-model/model-id: "qwen-image-2.0"
    isa-model/instance-group: "generative"
spec:
  selector:
    app: triton-qwen-image-2-0
  ports:
    - port: 8000
      targetPort: 8000
      name: http
    - port: 8001
      targetPort: 8001
      name: grpc
    - port: 8002
      targetPort: 8002
      name: metrics
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: triton-qwen-image-2-0-repo
  namespace: isa-cloud-production
  labels:
    isa-model/model-id: "qwen-image-2.0"
    isa-model/instance-group: "generative"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: local-replica2-delay-bind
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: triton-qwen-image-2-0-cache
  namespace: isa-cloud-production
  labels:
    isa-model/model-id: "qwen-image-2.0"
    isa-model/instance-group: "generative"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: local-replica2-delay-bind
