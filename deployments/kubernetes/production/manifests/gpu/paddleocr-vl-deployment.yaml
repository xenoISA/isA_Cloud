# vLLM Runtime — PaddleOCR-VL-0.9B (document parsing: OCR + layout + tables + formulas)
#
# Localizes the document-perception the platform ran on Modal (table-transformer
# ×2 + OCR). PaddleOCR-VL pairs a NaViT dynamic-resolution visual encoder with an
# ERNIE-4.5-0.3B head — one compact VLM that does text OCR, layout analysis,
# table structure, and formula recognition. Served by vLLM over OpenAI
# /v1/chat/completions (image_url in, structured markdown/HTML out).
#
# vLLM recipe (docs.vllm.ai/projects/recipes PaddleOCR-VL):
#   --trust-remote-code --max-num-batched-tokens 16384
#   --no-enable-prefix-caching --mm-processor-cache-gb 0
# Prefix-cache / mm-cache are OFF: OCR requests don't reuse prefixes or images,
# so caching only wastes VRAM. trust-remote-code pulls the custom modeling code.
#
# BLACKWELL sm_120: vLLM's own attention kernels — no flash-attn wheel needed.
# TIME-SLICING: shares the 96GB k8s-03 card. 0.9B (~2GB weights) so the mem cap
# is tiny (0.10 ~= 9GB incl. KV). The production deploy script rewrites namespace.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-paddleocr-vl
  namespace: isa-cloud-production
  labels: { app: paddleocr-vl, isa-model/model-id: paddleocr-vl }
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 20Gi } }
  storageClassName: local-replica2-delay-bind
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: paddleocr-vl-config
  namespace: isa-cloud-production
  labels: { app: paddleocr-vl, engine: vllm }
data:
  MODEL_ID: "PaddlePaddle/PaddleOCR-VL"
  SERVED_MODEL_NAME: "paddleocr-vl"
  GPU_MEMORY_UTILIZATION: "0.10"               # 0.9B model — tiny co-tenant footprint
  MAX_NUM_BATCHED_TOKENS: "16384"
  LIMIT_MM_IMAGE: "2"                          # OCR is per-page; allow a small batch
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paddleocr-vl
  namespace: isa-cloud-production
  labels:
    app: paddleocr-vl
    engine: vllm
    isa-model/instance-group: specialty
    isa-model/model-id: paddleocr-vl
spec:
  replicas: 1
  progressDeadlineSeconds: 2400
  strategy: { type: Recreate }
  selector: { matchLabels: { app: paddleocr-vl } }
  template:
    metadata:
      labels:
        app: paddleocr-vl
        engine: vllm
        isa-model/instance-group: specialty
        isa-model/model-id: paddleocr-vl
    spec:
      enableServiceLinks: false
      securityContext: { runAsNonRoot: false }
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - { key: isa.io/gpu-role-specialty, operator: In, values: ["true"] }
              - matchExpressions:
                  - { key: sn.io/gpu-role, operator: In, values: ["specialty"] }
      tolerations:
        - { key: nvidia.com/gpu, operator: Exists, effect: NoSchedule }
      containers:
        - name: vllm
          image: vllm/vllm-openai:cu130-nightly
          imagePullPolicy: IfNotPresent
          ports: [ { containerPort: 8000, name: http } ]
          env:
            - { name: MODEL_ID, valueFrom: { configMapKeyRef: { name: paddleocr-vl-config, key: MODEL_ID } } }
            - { name: SERVED_MODEL_NAME, valueFrom: { configMapKeyRef: { name: paddleocr-vl-config, key: SERVED_MODEL_NAME } } }
            - { name: GPU_MEMORY_UTILIZATION, valueFrom: { configMapKeyRef: { name: paddleocr-vl-config, key: GPU_MEMORY_UTILIZATION } } }
            - { name: MAX_NUM_BATCHED_TOKENS, valueFrom: { configMapKeyRef: { name: paddleocr-vl-config, key: MAX_NUM_BATCHED_TOKENS } } }
            - { name: LIMIT_MM_IMAGE, valueFrom: { configMapKeyRef: { name: paddleocr-vl-config, key: LIMIT_MM_IMAGE } } }
            - { name: HF_HUB_DISABLE_XET, value: "1" }
            - { name: HF_HOME, value: /root/.cache/huggingface }
            - { name: VLLM_PORT, value: "8000" }
            - { name: HF_TOKEN, valueFrom: { secretKeyRef: { name: huggingface-token, key: token, optional: true } } }
            - { name: HUGGING_FACE_HUB_TOKEN, valueFrom: { secretKeyRef: { name: huggingface-token, key: token, optional: true } } }
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -eu
              exec vllm serve "${MODEL_ID}" \
                --served-model-name "${SERVED_MODEL_NAME}" \
                --gpu-memory-utilization "${GPU_MEMORY_UTILIZATION}" \
                --max-num-batched-tokens "${MAX_NUM_BATCHED_TOKENS}" \
                --limit-mm-per-prompt.image "${LIMIT_MM_IMAGE}" \
                --no-enable-prefix-caching \
                --mm-processor-cache-gb 0 \
                --trust-remote-code \
                --host 0.0.0.0 --port 8000
          resources:
            requests: { cpu: "1000m", memory: "6Gi", nvidia.com/gpu: "1" }
            limits: { cpu: "4000m", memory: "16Gi", nvidia.com/gpu: "1" }
          startupProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 600           # small model; mostly image-pull + weights
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          volumeMounts:
            - { name: model-cache, mountPath: /root/.cache/huggingface }
      volumes:
        - name: model-cache
          persistentVolumeClaim: { claimName: model-cache-paddleocr-vl }
---
apiVersion: v1
kind: Service
metadata:
  name: paddleocr-vl
  namespace: isa-cloud-production
  labels: { app: paddleocr-vl, engine: vllm }
spec:
  type: ClusterIP
  selector: { app: paddleocr-vl }
  ports: [ { name: http, port: 8000, targetPort: 8000 } ]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: paddleocr-vl
  namespace: isa-cloud-production
spec:
  minAvailable: 0
  selector: { matchLabels: { app: paddleocr-vl } }
