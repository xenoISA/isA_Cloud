# Triton Engine — FLUX.2 fast text-to-image on `generative` GPU group (k8s-02)
#
# DRAFT / UNVERIFIED — authored from web research (June 2026), not yet applied
# or smoke-tested on any cluster.
#
# !!! NAMING CORRECTION (verify before merge) !!!
#   The catalog/service name is `flux-2-schnell` (carried over from FLUX.1's
#   "schnell" distilled tier), but as of June 2026 BLACK FOREST LABS HAS NOT
#   SHIPPED A "FLUX.2-schnell" REPO. The FLUX.2 line is:
#     - black-forest-labs/FLUX.2-dev      (32B, ~32 GB fp8 / >80 GB bf16)
#     - black-forest-labs/FLUX.2-klein-9B (distilled, ~29 GB VRAM)   <-- fast tier
#     - black-forest-labs/FLUX.2-klein-4B (distilled, ~13 GB VRAM)
#   "klein" is FLUX.2's fast/distilled family — the functional replacement for
#   FLUX.1 [schnell]. This manifest serves FLUX.2-klein-9B as the speed/preview
#   co-tenant beside Qwen-Image on the generative node. The k8s service name is
#   kept as triton-flux-2-schnell to honor the existing catalog/route contract
#   (and the comment in qwen-image-deployment.yaml), but MODEL_ID points at the
#   real artifact. Confirm the intended variant (klein-9B vs klein-4B) with the
#   ADR owner before applying.
#   Sources:
#     - https://huggingface.co/blog/flux-2
#     - https://huggingface.co/black-forest-labs/FLUX.2-klein-9B
#     - https://huggingface.co/black-forest-labs/FLUX.2-klein-4B
#     - https://github.com/black-forest-labs/flux2
#
# SERVING PATH: NO turnkey Triton image exists. Same strategy as Qwen-Image —
# Triton Python backend wrapping HuggingFace `diffusers` (Flux2Pipeline). The
# nvcr.io/nvidia/tritonserver base + a startup pip install of the diffusers
# stack is reused verbatim from triton-qwen-image-2-0 so the two co-tenants
# share an operational shape. Production should bake a versioned image with the
# diffusers stack + weights pre-staged. See research note in
# docs/runbooks/new-model-runtimes-research.md for the build-it-yourself detail.
#
# PLACEMENT: generative group, k8s-02, 48 GB MPS slice (ADR 0010). klein-9B is
# ~29 GB; co-tenant Qwen-Image is ~24 GB — together they exceed one 48 GB slice,
# so they each take a slice on k8s-02 (2 x 48 GB = 96 GB card). Pod requests
# nvidia.com/gpu: 1 (MPS renameByDefault=false -> one slice).
#
# Model repository layout (materialised at startup from the ConfigMap):
#   /models/flux-2-schnell/{config.pbtxt, 1/model.py}
#
# The production deploy script rewrites namespace: isa-cloud-production to the
# requested NAMESPACE, e.g. sn-cloud-production.
#
# RISK / UNKNOWN:
#   - Flux2Pipeline support + the FLUX.2 text encoder (Mistral3) need a recent
#     diffusers (>=0.36 / FLUX.2 release line). The pinned version below is a
#     guess — verify against the diffusers release that landed Flux2Pipeline.
#   - klein-9B is gated on HF; HF_TOKEN secret is required (not optional in
#     practice) for the weight download to succeed.
#   - VRAM headroom on a 48 GB slice for klein-9B + text encoder at bf16 is
#     tight; group offloading or fp8 may be needed. Smoke-test memory first.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: triton-flux-2-schnell-config
  namespace: isa-cloud-production
  labels:
    isa-model/model-id: "flux-2-schnell"
    isa-model/instance-group: "generative"
data:
  # Real servable artifact — see naming-correction note in the header.
  MODEL_ID: "black-forest-labs/FLUX.2-klein-9B"
  MODEL_NAME: "flux-2-schnell"
  MODEL_REPOSITORY: "/models"
  BACKEND: "python"
  INSTANCE_COUNT: "1"
  INSTANCE_KIND: "KIND_GPU"
  DEFAULT_HEIGHT: "1024"
  DEFAULT_WIDTH: "1024"
  # klein is distilled for few-step generation — fast tier defaults low.
  DEFAULT_NUM_INFERENCE_STEPS: "4"
  DEFAULT_GUIDANCE_SCALE: "0.0"
  OUTPUT_FORMAT: "PNG"
  MAX_HEIGHT: "1536"
  MAX_WIDTH: "1536"
  DTYPE: "bfloat16"
  LOG_VERBOSE: "1"
  CONFIG_PBTXT: |
    name: "flux-2-schnell"
    backend: "python"
    max_batch_size: 0
    input [
      {
        name: "prompt"
        data_type: TYPE_STRING
        dims: [ 1 ]
      },
      {
        name: "height"
        data_type: TYPE_INT32
        dims: [ 1 ]
        optional: true
      },
      {
        name: "width"
        data_type: TYPE_INT32
        dims: [ 1 ]
        optional: true
      },
      {
        name: "num_inference_steps"
        data_type: TYPE_INT32
        dims: [ 1 ]
        optional: true
      },
      {
        name: "guidance_scale"
        data_type: TYPE_FP32
        dims: [ 1 ]
        optional: true
      },
      {
        name: "seed"
        data_type: TYPE_INT64
        dims: [ 1 ]
        optional: true
      }
    ]
    output [
      {
        name: "image"
        data_type: TYPE_STRING
        dims: [ 1 ]
      }
    ]
    instance_group [
      {
        count: 1
        kind: KIND_GPU
      }
    ]
    parameters [
      {
        key: "EXECUTION_ENV_PATH"
        value: { string_value: "$$TRITON_MODEL_DIRECTORY/python_env" }
      }
    ]
  CONFIG_PY: |
    """Triton Python backend wrapper for FLUX.2 (klein) via diffusers.

    DRAFT: requires a diffusers release that ships Flux2Pipeline. Confirm the
    pipeline class + few-step defaults against the FLUX.2 model card before use.
    """
    import base64
    import io
    import json
    import os

    import numpy as np
    import torch
    import triton_python_backend_utils as pb_utils
    from diffusers import Flux2Pipeline


    class TritonPythonModel:
        def initialize(self, args):
            json.loads(args["model_config"])
            self.model_id = os.environ.get(
                "MODEL_ID", "black-forest-labs/FLUX.2-klein-9B"
            )
            self.default_height = int(os.environ.get("DEFAULT_HEIGHT", "1024"))
            self.default_width = int(os.environ.get("DEFAULT_WIDTH", "1024"))
            self.default_steps = int(
                os.environ.get("DEFAULT_NUM_INFERENCE_STEPS", "4")
            )
            self.default_guidance = float(
                os.environ.get("DEFAULT_GUIDANCE_SCALE", "0.0")
            )
            self.max_height = int(os.environ.get("MAX_HEIGHT", "1536"))
            self.max_width = int(os.environ.get("MAX_WIDTH", "1536"))
            self.output_format = os.environ.get("OUTPUT_FORMAT", "PNG").upper()
            dtype = (
                torch.bfloat16
                if os.environ.get("DTYPE", "bfloat16") == "bfloat16"
                else torch.float16
            )
            self.pipe = Flux2Pipeline.from_pretrained(
                self.model_id, torch_dtype=dtype
            ).to("cuda")
            self.pipe.set_progress_bar_config(disable=True)

        def _scalar(self, request, name, default, cast):
            tensor = pb_utils.get_input_tensor_by_name(request, name)
            if tensor is None:
                return default
            return cast(tensor.as_numpy().reshape(-1)[0])

        def _clamp(self, value, ceiling):
            return min(int(value), int(ceiling))

        def execute(self, requests):
            responses = []
            for request in requests:
                prompt_arr = pb_utils.get_input_tensor_by_name(
                    request, "prompt"
                ).as_numpy()
                prompt = prompt_arr.reshape(-1)[0]
                if isinstance(prompt, bytes):
                    prompt = prompt.decode("utf-8")

                height = self._clamp(
                    self._scalar(request, "height", self.default_height, int),
                    self.max_height,
                )
                width = self._clamp(
                    self._scalar(request, "width", self.default_width, int),
                    self.max_width,
                )
                steps = self._scalar(
                    request, "num_inference_steps", self.default_steps, int
                )
                guidance = self._scalar(
                    request, "guidance_scale", self.default_guidance, float
                )
                seed = self._scalar(request, "seed", -1, int)

                generator = None
                if seed >= 0:
                    generator = torch.Generator(device="cuda").manual_seed(seed)

                result = self.pipe(
                    prompt=prompt,
                    height=height,
                    width=width,
                    num_inference_steps=steps,
                    guidance_scale=guidance,
                    generator=generator,
                )
                image = result.images[0]
                buffer = io.BytesIO()
                image.save(buffer, format=self.output_format)
                encoded = base64.b64encode(buffer.getvalue()).decode("ascii")

                out_tensor = pb_utils.Tensor(
                    "image", np.array([encoded], dtype=object)
                )
                responses.append(pb_utils.InferenceResponse([out_tensor]))
            return responses

        def finalize(self):
            del self.pipe
            torch.cuda.empty_cache()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-flux-2-schnell
  namespace: isa-cloud-production
  labels:
    app: triton-flux-2-schnell
    engine: triton
    isa-model/model-id: "flux-2-schnell"
    isa-model/instance-group: "generative"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triton-flux-2-schnell
  template:
    metadata:
      labels:
        app: triton-flux-2-schnell
        engine: triton
        isa-model/model-id: "flux-2-schnell"
        isa-model/instance-group: "generative"
    spec:
      securityContext:
        runAsNonRoot: false
      containers:
        - name: triton
          image: nvcr.io/nvidia/tritonserver:24.01-py3
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8001
              name: grpc
            - containerPort: 8002
              name: metrics
          env:
            - name: MODEL_ID
              valueFrom:
                configMapKeyRef:
                  name: triton-flux-2-schnell-config
                  key: MODEL_ID
            - name: MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: triton-flux-2-schnell-config
                  key: MODEL_NAME
            - name: MODEL_REPOSITORY
              valueFrom:
                configMapKeyRef:
                  name: triton-flux-2-schnell-config
                  key: MODEL_REPOSITORY
            - name: DEFAULT_HEIGHT
              valueFrom:
                configMapKeyRef:
                  name: triton-flux-2-schnell-config
                  key: DEFAULT_HEIGHT
            - name: DEFAULT_WIDTH
              valueFrom:
                configMapKeyRef:
                  name: triton-flux-2-schnell-config
                  key: DEFAULT_WIDTH
            - name: DEFAULT_NUM_INFERENCE_STEPS
              valueFrom:
                configMapKeyRef:
                  name: triton-flux-2-schnell-config
                  key: DEFAULT_NUM_INFERENCE_STEPS
            - name: DEFAULT_GUIDANCE_SCALE
              valueFrom:
                configMapKeyRef:
                  name: triton-flux-2-schnell-config
                  key: DEFAULT_GUIDANCE_SCALE
            - name: OUTPUT_FORMAT
              valueFrom:
                configMapKeyRef:
                  name: triton-flux-2-schnell-config
                  key: OUTPUT_FORMAT
            - name: MAX_HEIGHT
              valueFrom:
                configMapKeyRef:
                  name: triton-flux-2-schnell-config
                  key: MAX_HEIGHT
            - name: MAX_WIDTH
              valueFrom:
                configMapKeyRef:
                  name: triton-flux-2-schnell-config
                  key: MAX_WIDTH
            - name: DTYPE
              valueFrom:
                configMapKeyRef:
                  name: triton-flux-2-schnell-config
                  key: DTYPE
            - name: HF_HOME
              value: "/root/.cache/huggingface"
            # FLUX.2-klein is gated — token is effectively REQUIRED here.
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: token
                  optional: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              mkdir -p "$MODEL_REPOSITORY/$MODEL_NAME/1"
              if [ ! -f "$MODEL_REPOSITORY/$MODEL_NAME/config.pbtxt" ]; then
                cp /etc/triton-config/config.pbtxt \
                  "$MODEL_REPOSITORY/$MODEL_NAME/config.pbtxt"
              fi
              if [ ! -f "$MODEL_REPOSITORY/$MODEL_NAME/1/model.py" ]; then
                cp /etc/triton-config/model.py \
                  "$MODEL_REPOSITORY/$MODEL_NAME/1/model.py"
              fi
              # FLUX.2 needs a diffusers release that ships Flux2Pipeline.
              # Pin verified against the FLUX.2 release line before baking.
              pip install --no-cache-dir \
                "diffusers>=0.36" \
                "transformers>=4.49" \
                "accelerate>=0.34" \
                "safetensors>=0.4" \
                "sentencepiece>=0.2" \
                "Pillow>=10.0"
              exec tritonserver \
                --model-repository="$MODEL_REPOSITORY" \
                --strict-model-config=true \
                --log-verbose=1 \
                --allow-http=true \
                --allow-grpc=true \
                --http-port=8000 \
                --grpc-port=8001 \
                --metrics-port=8002
          resources:
            requests:
              memory: "32Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
            limits:
              memory: "48Gi"
              cpu: "8"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 15
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: 8000
            initialDelaySeconds: 360
            periodSeconds: 30
            failureThreshold: 6
          volumeMounts:
            - name: model-repository
              mountPath: /models
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: triton-config
              mountPath: /etc/triton-config
              readOnly: true
      volumes:
        - name: model-repository
          persistentVolumeClaim:
            claimName: triton-flux-2-schnell-repo
        - name: model-cache
          persistentVolumeClaim:
            claimName: triton-flux-2-schnell-cache
        - name: triton-config
          configMap:
            name: triton-flux-2-schnell-config
            items:
              - key: CONFIG_PBTXT
                path: config.pbtxt
              - key: CONFIG_PY
                path: model.py
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: isa.io/gpu-role-specialty
                    operator: In
                    values: ["true"]
              - matchExpressions:
                  - key: sn.io/gpu-role
                    operator: In
                    values: ["specialty"]
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: triton-flux-2-schnell
  namespace: isa-cloud-production
  labels:
    app: triton-flux-2-schnell
    isa-model/model-id: "flux-2-schnell"
    isa-model/instance-group: "generative"
spec:
  selector:
    app: triton-flux-2-schnell
  ports:
    - port: 8000
      targetPort: 8000
      name: http
    - port: 8001
      targetPort: 8001
      name: grpc
    - port: 8002
      targetPort: 8002
      name: metrics
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: triton-flux-2-schnell-repo
  namespace: isa-cloud-production
  labels:
    isa-model/model-id: "flux-2-schnell"
    isa-model/instance-group: "generative"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: local-replica2-delay-bind
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: triton-flux-2-schnell-cache
  namespace: isa-cloud-production
  labels:
    isa-model/model-id: "flux-2-schnell"
    isa-model/instance-group: "generative"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 120Gi
  storageClassName: local-replica2-delay-bind
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: triton-flux-2-schnell
  namespace: isa-cloud-production
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app: triton-flux-2-schnell
