---
# Consul — scrape telemetry endpoint
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: consul
  namespace: isa-cloud-production
  labels:
    release: prometheus
    tier: infrastructure
spec:
  namespaceSelector:
    matchNames:
      - isa-cloud-production
  selector:
    matchLabels:
      app.kubernetes.io/name: consul
  endpoints:
    - port: http
      path: /v1/agent/metrics
      params:
        format: ["prometheus"]
      interval: 30s
      scrapeTimeout: 10s
