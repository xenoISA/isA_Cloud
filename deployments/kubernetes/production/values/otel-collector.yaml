# OpenTelemetry Collector — Trace Ingestion and Export
# Chart: open-telemetry/opentelemetry-collector
# Receives OTLP from services, exports to Tempo

mode: deployment
replicaCount: 2

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  processors:
    batch:
      send_batch_size: 1000
      timeout: 5s
    memory_limiter:
      check_interval: 1s
      limit_mib: 400
      spike_limit_mib: 100
    resource:
      attributes:
        - key: cluster
          value: isa-cloud-production
          action: upsert

  exporters:
    otlp/tempo:
      endpoint: "tempo.isa-cloud-production.svc.cluster.local:4317"
      tls:
        insecure: true

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch, resource]
        exporters: [otlp/tempo]

# Service for receiving traces
service:
  type: ClusterIP
  ports:
    otlp-grpc:
      port: 4317
      protocol: TCP
    otlp-http:
      port: 4318
      protocol: TCP

# Pod scheduling
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
          topologyKey: kubernetes.io/hostname

# ServiceMonitor
serviceMonitor:
  enabled: true
  labels:
    release: prometheus
