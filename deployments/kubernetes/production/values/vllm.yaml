# vLLM Inference Engine - Production Values
# Deployed as StatefulSet for persistent model cache
# Requires: NVIDIA GPU Operator, model-cache PVC

# Image
# Blackwell (RTX PRO 6000 / sm_120) plus Qwen3.6/Qwen3.5 architecture support
# currently needs the CUDA 13 nightly vLLM OpenAI image. Mirror this image into
# Harbor once push credentials are available; rel-25.09 cannot load qwen3_5.
image:
  repository: vllm/vllm-openai
  tag: "cu130-nightly"
  pullPolicy: IfNotPresent

# Initial production replica: 1. model-cache-vllm is an RWO block PVC; scaling
# beyond one replica needs per-replica PVCs or a confirmed RWX cache.
replicaCount: 1

# GPU Resources
resources:
  requests:
    cpu: "2000m"
    memory: "16Gi"
    nvidia.com/gpu: "1"
  limits:
    cpu: "4000m"
    memory: "32Gi"
    nvidia.com/gpu: "1"

# vLLM configuration
config:
  modelId: "Qwen/Qwen3.6-27B-FP8"
  tensorParallelSize: 1
  gpuMemoryUtilization: "0.85"
  maxModelLen: "32768"
  maxNumSeqs: "32"
  blockSize: "16"
  enablePrefixCaching: true
  enableChunkedPrefill: false
  reasoningParser: "qwen3"
  enforceEager: false
  languageModelOnly: true
  # Draft model for Qwen family. Keep disabled in chart templates that do not
  # support vLLM >= 0.8 speculative-config syntax.
  speculativeModel: "Qwen/Qwen3-0.6B"
  numSpeculativeTokens: "5"

# Model cache persistence
persistence:
  enabled: true
  existingClaim: model-cache-vllm
  mountPath: /root/.cache/huggingface

# Service
service:
  type: ClusterIP
  port: 8000

# Pod scheduling — GPU topology constraint
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: isa.io/gpu-role-llm
              operator: In
              values: ["true"]
        - matchExpressions:
            - key: sn.io/gpu-role
              operator: In
              values: ["llm"]
  # For TP>1: ensure all GPUs on same node
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: vllm
          topologyKey: kubernetes.io/hostname

# Topology spread
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app: vllm

# Probes
livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 900
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

startupProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 300  # Allow up to 50 min for first-load compile/model initialization

# Security
securityContext:
  runAsNonRoot: false  # vLLM needs root for GPU access in some configs

# Metrics
metrics:
  enabled: true
  port: 8000
  path: /metrics
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus
    interval: 15s

# HuggingFace token
huggingfaceToken:
  existingSecret: huggingface-token
  key: token

# PDB
podDisruptionBudget:
  enabled: true
  minAvailable: 0  # Allow full drain for GPU maintenance

# Network Policy
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: isa-cloud-production
