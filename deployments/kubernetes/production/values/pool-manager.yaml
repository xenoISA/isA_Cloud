# Pool Manager — Resource pool gateway for agent VM allocation

image:
  repository: harbor.isa.io/isa/pool-manager
  tag: "latest"
  pullPolicy: Always

replicaCount: 2

# Resources
resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# Service
service:
  type: ClusterIP
  port: 8090

# Configuration
config:
  cloudOsHost: cloud-os.isa-cloud-production.svc.cluster.local
  cloudOsPort: "8086"
  redisHost: redis-cluster.isa-cloud-production.svc.cluster.local
  redisPort: "6379"
  natsUrl: nats://nats.isa-cloud-production.svc.cluster.local:4222
  consulHost: consul-server.isa-cloud-production.svc.cluster.local
  consulPort: "8500"
  # Pool settings
  minPoolSize: "2"
  maxPoolSize: "20"
  poolScaleUpThreshold: "0.8"
  poolScaleDownThreshold: "0.3"
  vmIdleTimeoutMinutes: "30"

# Pod scheduling
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: pool-manager
          topologyKey: kubernetes.io/hostname

# Health probes
livenessProbe:
  httpGet:
    path: /health
    port: 8090
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8090
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3

# Metrics
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus

# PDB
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Network Policy
networkPolicy:
  enabled: true
