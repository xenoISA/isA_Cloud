# Ray GPU Cluster — GPU workers for distributed inference via Ray Serve
# Chart: kuberay/ray-cluster

fullnameOverride: ray-gpu

head:
  rayStartParams:
    dashboard-host: "0.0.0.0"
    num-cpus: "0"
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  serviceType: ClusterIP

workerGroups:
  - groupName: gpu-workers
    replicas: 1
    minReplicas: 0
    maxReplicas: 4
    rayStartParams:
      num-cpus: "2"
      num-gpus: "1"
    resources:
      requests:
        cpu: "1000m"
        memory: "8Gi"
        nvidia.com/gpu: "1"
      limits:
        cpu: "2000m"
        memory: "16Gi"
        nvidia.com/gpu: "1"
    nodeSelector:
      nvidia.com/gpu.present: "true"
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule

autoscalerOptions:
  upscalingMode: Default
  idleTimeoutSeconds: 120
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
