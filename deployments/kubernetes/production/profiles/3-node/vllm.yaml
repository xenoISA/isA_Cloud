# vLLM — 3-node override
# Qwen3.6 27B Dense FP8 bootstrap runtime. Keep one replica while model-cache-vllm is
# RWO; HA replicas require per-replica PVCs or confirmed RWX cache.
resources:
  requests:
    cpu: "1000m"
    memory: "8Gi"
    nvidia.com/gpu: "1"
  limits:
    cpu: "2000m"
    memory: "16Gi"
    nvidia.com/gpu: "1"

config:
  gpuMemoryUtilization: "0.85"
  maxNumSeqs: "32"

persistence:
  # Use smaller cache on 3-node
  size: 200Gi
