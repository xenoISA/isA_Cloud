apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "redis.name" . }}-config
  labels:
    {{- include "redis.labels" . | nindent 4 }}
data:
  redis.conf: |
    bind 0.0.0.0
    protected-mode no
    port {{ .Values.service.port }}
    dir /data
    appendonly {{ ternary "yes" "no" .Values.appendonly }}
    {{- range .Values.extraConfig }}
    {{ . }}
    {{- end }}
