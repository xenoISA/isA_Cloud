{{- /*
  Root password Secret rendered only when rootPassword.create=true (kind
  only). Production must pre-provision the same Secret externally with
  key `password`.

  initPassword in the upstream chart reads the same Secret name. We keep
  both this layer and the upstream layer pointing at it so a Helm install
  in kind comes up cleanly without external dependencies.
*/ -}}
{{- if .Values.rootPassword.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ index .Values "kube-starrocks" "starrocks" "initPassword" "passwordSecret" }}
  labels:
    {{- include "starrocks-bigdata.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ required "rootPassword.password is required when rootPassword.create=true" .Values.rootPassword.password | quote }}
{{- end }}
