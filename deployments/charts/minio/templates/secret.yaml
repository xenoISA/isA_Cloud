{{- /*
  Rendered only when auth.create=true (kind / dev only). Keys
  access-key / secret-key match what the hive-metastore chart's S3A
  `existingSecret: minio-credentials` reads. We also include the
  upstream chart's expected rootUser / rootPassword keys so the same
  Secret can serve both consumers.

  Production renders nothing here — the operator pre-provisions the
  Secret externally (vault / external-secrets).
*/ -}}
{{- if .Values.auth.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.auth.secretName }}
  labels:
    {{- include "minio-bigdata.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Keys consumed by the hive-metastore S3A client.
  access-key: {{ required "auth.rootUser is required when auth.create=true" .Values.auth.rootUser | quote }}
  secret-key: {{ required "auth.rootPassword is required when auth.create=true" .Values.auth.rootPassword | quote }}
  # Keys consumed by the upstream minio/minio chart when it reads
  # existingSecret (sets MINIO_ROOT_USER / MINIO_ROOT_PASSWORD).
  rootUser: {{ .Values.auth.rootUser | quote }}
  rootPassword: {{ .Values.auth.rootPassword | quote }}
{{- end }}
