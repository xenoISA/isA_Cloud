apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hms.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  serviceName: {{ .Values.name }}
  selector:
    matchLabels:
      {{- include "hms.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hms.labels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.jdbcDriver.enabled }}
      initContainers:
        - name: copy-postgresql-jdbc-driver
          image: "{{ .Values.jdbcDriver.image.registry }}/{{ .Values.jdbcDriver.image.repository }}:{{ .Values.jdbcDriver.image.tag }}"
          imagePullPolicy: {{ .Values.jdbcDriver.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              cp "{{ .Values.jdbcDriver.sourcePath }}" /jdbc/postgresql.jar
              chmod 0444 /jdbc/postgresql.jar
          securityContext:
            {{- toYaml .Values.jdbcDriver.securityContext | nindent 12 }}
          volumeMounts:
            - name: postgres-jdbc-driver
              mountPath: /jdbc
      {{- end }}
      containers:
        - name: hive-metastore
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Bypass the apache/hive entrypoint so it cannot run Derby schema
          # initialization before our PostgreSQL config is rendered.
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -e
              render_hive_site() {
                export HIVE_CONF_DIR=/tmp/hive-conf
                mkdir -p "${HIVE_CONF_DIR}"
                escape_sed() {
                  printf '%s' "$1" | sed -e 's/[\/&|\\]/\\&/g'
                }
                db_user="$(escape_sed "${HIVE_DB_USERNAME}")"
                db_pass="$(escape_sed "${HIVE_DB_PASSWORD}")"
                aws_key="$(escape_sed "${AWS_ACCESS_KEY_ID:-}")"
                aws_secret="$(escape_sed "${AWS_SECRET_ACCESS_KEY:-}")"
                sed \
                  -e "s|\${env:HIVE_DB_USERNAME}|${db_user}|g" \
                  -e "s|\${env:HIVE_DB_PASSWORD}|${db_pass}|g" \
                  -e "s|\${env:AWS_ACCESS_KEY_ID}|${aws_key}|g" \
                  -e "s|\${env:AWS_SECRET_ACCESS_KEY}|${aws_secret}|g" \
                  /opt/hive/conf/hive-site.xml > "${HIVE_CONF_DIR}/hive-site.xml"
              }
              render_hive_site
              exec /opt/hive/bin/hive --service metastore
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: thrift
              containerPort: {{ .Values.port }}
              protocol: TCP
          env:
            # SERVICE_NAME is what the Hive entrypoint uses when no
            # `--service` flag is passed; we set both for safety.
            - name: SERVICE_NAME
              value: metastore
            # The apache/hive entrypoint runs `schematool -dbType derby
            # -initOrUpgradeSchema` BEFORE starting the metastore unless
            # SKIP_SCHEMA_INIT=true. The init-schema Job already handles
            # postgres schema bring-up, so we always skip the entrypoint's
            # auto-init here — otherwise the Pod runs derby schemaTool
            # against a non-existent derby database and crashes before
            # the metastore process ever starts.
            - name: SKIP_SCHEMA_INIT
              value: "true"
            - name: DB_DRIVER
              value: postgres
            - name: HIVE_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "hms.dbSecretName" . }}
                  key: username
            - name: HIVE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hms.dbSecretName" . }}
                  key: password
            {{- if .Values.s3a.enabled }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "hms.s3aSecretName" . }}
                  key: access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hms.s3aSecretName" . }}
                  key: secret-key
            {{- end }}
            - name: HIVE_OPTS
              value: "-Xms{{ .Values.jvm.xms }} -Xmx{{ .Values.jvm.xmx }}"
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # HMS has no HTTP health endpoint — TCP probes on the Thrift
          # port are the canonical pattern.
          livenessProbe:
            tcpSocket:
              port: thrift
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            tcpSocket:
              port: thrift
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /opt/hive/conf/hive-site.xml
              subPath: hive-site.xml
              readOnly: true
            {{- if .Values.jdbcDriver.enabled }}
            - name: postgres-jdbc-driver
              mountPath: {{ .Values.jdbcDriver.mountPath }}
              subPath: postgresql.jar
              readOnly: true
            {{- end }}
            # readOnlyRootFilesystem demands writable tmp + Hive scratch.
            - name: tmp
              mountPath: /tmp
            - name: hive-scratch
              mountPath: /opt/hive/scratch
      volumes:
        - name: config
          configMap:
            name: {{ include "hms.configMapName" . }}
            items:
              - key: hive-site.xml
                path: hive-site.xml
        {{- if .Values.jdbcDriver.enabled }}
        - name: postgres-jdbc-driver
          emptyDir: {}
        {{- end }}
        - name: tmp
          emptyDir: {}
        - name: hive-scratch
          emptyDir: {}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
