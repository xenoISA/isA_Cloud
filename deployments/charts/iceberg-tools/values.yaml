# =============================================================================
# iceberg-tools chart — defaults (xenoISA/isA_Cloud#260)
# =============================================================================
# Self-written. Renders only:
#   - ConfigMap "iceberg-catalog" with the catalog properties consumed
#     by Flink + StarRocks
#   - Optional init Job that smoke-tests reachability of HMS + MinIO
#     (DNS + nc + bucket list)
#
# HMS-backed Iceberg topology — no separate Iceberg REST catalog server
# (per v3 plan §四 "Iceberg REST 不必装"). HMS owns the metadata; MinIO
# owns the data; Iceberg is a table-format library bundled into the
# Flink + StarRocks images.
#
# Replaces the earlier paimon-tools chart. Profile defaults below match
# the staging tier.
# =============================================================================

name: iceberg-tools
namespace: isa-bigdata

# Iceberg version this chart targets. Determines the connector jars
# baked into the flink-sql-runner image (xenoISA/isA_Cloud#258); the
# two pins must stay in sync. Iceberg 1.7.x is the first release that
# publishes a Flink 1.20 runtime
# (`iceberg-flink-runtime-1.20-<version>.jar`); 1.6.x supports Flink
# 1.18 / 1.19 only.
icebergVersion: "1.7.2"

# =============================================================================
# Catalog properties — rendered into the iceberg-catalog ConfigMap.
# Consumers mount this ConfigMap and pass these as Flink/StarRocks
# catalog options. Hostnames default to the in-cluster Services produced
# by the hive-metastore + minio charts.
#
# Property keys mirror Iceberg's `Catalog.create()` API surface:
#   type=iceberg, catalog-impl=org.apache.iceberg.hive.HiveCatalog
#   uri=thrift://...:9083, warehouse=s3a://lake/warehouse/
# =============================================================================
catalog:
  # Iceberg's Flink/StarRocks catalog type. The HMS implementation lives
  # at org.apache.iceberg.hive.HiveCatalog; downstream consumers pass
  # this as `type=iceberg` + `catalog-type=hive`.
  type: iceberg
  catalogType: hive
  catalogImpl: org.apache.iceberg.hive.HiveCatalog
  uri: "thrift://hive-metastore.isa-bigdata.svc.cluster.local:9083"
  warehouse: "s3a://lake/warehouse/"
  # Default database the consumers look up tables under. Optional —
  # downstream charts may override per-job.
  defaultDatabase: iceberg_default
  # Databases (Iceberg namespaces) ensured at deploy time by the
  # namespaceInit Job (templates/namespace-init-job.yaml). Iceberg's
  # `CREATE TABLE iceberg_hms.<db>.<table>` does NOT auto-create <db> in HMS,
  # so each consumer namespace a streaming-sink job writes into must exist
  # first. Empty by default — downstream/edition values list the domain
  # databases their realtime sink jobs target, e.g.:
  #   databases:
  #     - my_domain
  databases: []

s3a:
  endpoint: "http://minio.isa-bigdata.svc.cluster.local:9000"
  pathStyleAccess: true
  sslEnabled: false
  # Credentials are NOT in the ConfigMap. Consumer charts inject these
  # as env vars from the minio-credentials Secret; the catalog config
  # references them via Hadoop's ${env:VAR} interpolation.
  credentialsSecret:
    name: minio-credentials
    accessKeyKey: access-key
    secretKeyKey: secret-key

# Free-form passthrough. Each entry becomes a key in the ConfigMap.
# Useful for Iceberg-specific tuning (write.format.default,
# commit.retry.num-retries, etc.) without re-templating.
extraCatalogProperties: {}
  # Example:
  # write.format.default: parquet
  # commit.retry.num-retries: "3"

# =============================================================================
# Init Job — smoke test for HMS + MinIO reachability.
#
# Why so light: the actual V-2 / V-3 verification (Iceberg table create →
# Flink CDC write → StarRocks read) requires a running Flink cluster,
# which is a separate chart. Until then, a lightweight DNS + nc + bucket-
# list check catches the most common deploy mistakes (wrong host, wrong
# port, missing bucket) without pulling a multi-hundred-MB Iceberg image.
#
# Helm hook: pre-install + pre-upgrade. ttlSecondsAfterFinished cleans
# the Pod after success.
# =============================================================================
init:
  enabled: true
  image:
    registry: docker.io
    # alpine + busybox-style tools; ~5MB and present in air-gap caches.
    repository: alpine
    tag: "3.19"
    pullPolicy: IfNotPresent
  # Hosts probed at runtime. Default to the in-cluster Service DNS for
  # hive-metastore + minio. customer-prod can extend for off-cluster
  # endpoints.
  probeHosts:
    - host: hive-metastore.isa-bigdata.svc.cluster.local
      port: 9083
      label: hive-metastore-thrift
    - host: minio.isa-bigdata.svc.cluster.local
      port: 9000
      label: minio-s3
  # Bucket existence check — HEAD against /<bucket>/?list-type=2 returns
  # 200 (empty bucket) or 403 (auth required). Either is OK for a smoke
  # test; only DNS / TCP failures block.
  bucketProbe:
    endpoint: "http://minio.isa-bigdata.svc.cluster.local:9000"
    bucket: lake
  backoffLimit: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  runAsUser: 1000

priorityClassName: ""

podAnnotations: {}

# Namespace bootstrap Job (templates/namespace-init-job.yaml). Ensures every
# `catalog.databases` entry exists as an Iceberg namespace in HMS before any
# streaming-sink job writes into it. Inert unless both `enabled: true` and
# `catalog.databases` is non-empty.
namespaceInit:
  enabled: true
  # The flink-sql-runner image — carries sql-client.sh + the iceberg/hive jars.
  # Air-gapped deployments override the repository to a private registry mirror.
  image:
    repository: ghcr.io/xenoISA/flink-sql-runner
    tag: "1.20.0-runner-1.10.0-iceberg-1.7.2"
    pullPolicy: IfNotPresent
  backoffLimit: 3
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
