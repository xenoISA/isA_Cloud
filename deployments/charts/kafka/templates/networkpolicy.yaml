{{- /*
  Optional ingress restriction on the broker listeners. Strimzi-managed
  pods carry the `strimzi.io/cluster: <name>` label which we use as the
  podSelector. Egress is unrestricted (brokers gossip with each other and
  pull from the cluster CA service).
*/ -}}
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.name }}-brokers
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kafka.strimziSelector" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- range .Values.networkPolicy.allowedNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
        # Allow broker-to-broker traffic inside the cluster.
        - podSelector:
            matchLabels:
              {{- include "kafka.strimziSelector" . | nindent 14 }}
      ports:
        {{- if .Values.listeners.plain.enabled }}
        - protocol: TCP
          port: {{ .Values.listeners.plain.port }}
        {{- end }}
        {{- if .Values.listeners.tls.enabled }}
        - protocol: TCP
          port: {{ .Values.listeners.tls.port }}
        {{- end }}
        # Replication / controller listener (Strimzi default 9090/9091).
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9091
{{- end }}
