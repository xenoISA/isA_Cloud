apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
      {{- if or .Values.consul.enabled .Values.podAnnotations }}
      annotations:
        {{- if .Values.consul.enabled }}
        consul.hashicorp.com/connect-inject: "true"
        consul.hashicorp.com/service-name: {{ .Values.name }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      # Graceful shutdown: must accommodate the app's drain window
      # (xenoISA/isA_MCP#669). Defaults to 30s if not set, matching K8s default.
      {{- with .Values.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      # Pod-level security context (applies to all containers)
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ .Values.name }}
        image: {{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        # Container-level security context
        {{- if .Values.securityContext }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        {{- end }}
        ports:
        - containerPort: {{ .Values.port }}
          name: http
        {{- if .Values.configMapRef }}
        envFrom:
        - configMapRef:
            name: {{ .Values.configMapRef }}
        {{- end }}
        env:
        {{- if .Values.observability }}
        - name: TEMPO_HOST
          value: {{ .Values.observability.tempoHost | quote }}
        - name: TEMPO_PORT
          value: {{ .Values.observability.tempoPort | quote }}
        - name: LOKI_URL
          value: {{ .Values.observability.lokiUrl | quote }}
        - name: ISA_ENV
          value: {{ .Values.observability.isaEnv | quote }}
        {{- end }}
        {{- if .Values.env }}
        {{- toYaml .Values.env | nindent 8 }}
        {{- end }}
        resources:
          requests:
            memory: {{ .Values.resources.requests.memory }}
            cpu: {{ .Values.resources.requests.cpu }}
          limits:
            memory: {{ .Values.resources.limits.memory }}
            cpu: {{ .Values.resources.limits.cpu }}
        readinessProbe:
          httpGet:
            path: {{ .Values.health.path }}
            port: {{ .Values.port }}
          initialDelaySeconds: {{ .Values.health.initialDelaySeconds }}
          periodSeconds: {{ .Values.health.periodSeconds }}
        {{- if .Values.volumeMounts }}
        volumeMounts:
        {{- toYaml .Values.volumeMounts | nindent 8 }}
        {{- end }}
        # Liveness on a separate path that bypasses drain-503 logic
        # (xenoISA/isA_MCP#669). Falls back to .Values.health.path for
        # services that haven't split the endpoints yet.
        livenessProbe:
          httpGet:
            path: {{ .Values.liveness.path | default .Values.health.path }}
            port: {{ .Values.port }}
          initialDelaySeconds: {{ .Values.liveness.initialDelaySeconds | default 15 }}
          periodSeconds: {{ .Values.liveness.periodSeconds | default 20 }}
        {{- if and .Values.startupProbe .Values.startupProbe.enabled }}
        # startupProbe holds liveness off until the app is fully booted.
        # Total budget = failureThreshold * periodSeconds.
        startupProbe:
          httpGet:
            path: {{ .Values.startupProbe.path | default .Values.health.path }}
            port: {{ .Values.port }}
          failureThreshold: {{ .Values.startupProbe.failureThreshold | default 30 }}
          periodSeconds: {{ .Values.startupProbe.periodSeconds | default 5 }}
        {{- end }}
        {{- with .Values.lifecycle }}
        # preStop runs before SIGTERM so K8s endpoint slices propagate
        # the pod removal before the in-app drain begins.
        lifecycle:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.volumes }}
      volumes:
      {{- toYaml .Values.volumes | nindent 6 }}
      {{- end }}
