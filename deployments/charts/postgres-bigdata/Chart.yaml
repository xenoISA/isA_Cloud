apiVersion: v2
name: postgres-bigdata
description: |
  Shared PostgreSQL instance for the isA platform's big-data foundation.
  Backs hive-metastore (Paimon catalog), apicurio-registry (schema
  storage), and dataphin (vendor metadata). Wraps the bitnami/postgresql
  chart with our profile defaults (kind-local / dev-shared / customer-prod)
  and pre-creates the per-consumer databases via initdb scripts.

  See xenoISA/isA_Cloud#237 and xenoISA/sn-commercial-tower ADR-0002 §2.5
  ("bitnami chart 作 dep").
type: application
version: 0.1.0
appVersion: "18.3.0"
keywords:
  - postgresql
  - bigdata
  - data-platform
  - metadata
home: https://github.com/bitnami/charts/tree/main/bitnami/postgresql
sources:
  - https://github.com/xenoISA/isA_Cloud
  - https://github.com/bitnami/charts
maintainers:
  - name: isA Platform
dependencies:
  - name: postgresql
    version: "18.6.3"
    repository: https://charts.bitnami.com/bitnami
