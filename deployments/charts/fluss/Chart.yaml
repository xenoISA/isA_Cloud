apiVersion: v2
name: fluss
description: |
  Apache Fluss chart shell — DEPRECATED-IN-WAITING as of 2026-05-09.
  The big-data foundation pivoted from Paimon to Iceberg per the v3
  plan (xenoISA/isA_Cloud#260). Fluss is Paimon-derived; without
  Paimon, the W12+ activation gate is unsatisfiable. The chart stays
  in the umbrella at enabled=false until ADR-0003 ratifies the
  Iceberg path on 2026-05-13, after which it will be removed in a
  follow-up cleanup PR. Do not flip enabled=true.

  See xenoISA/isA_Cloud#260 (Iceberg migration), xenoISA/isA_Cloud#253
  (original story, now superseded), and xenoISA/sn-commercial-tower
  commit 6c6bb4d / appendix-architecture-v3-iceberg.md.
type: application
version: 0.1.0
# Sentinel appVersion. Bump to a real Fluss release tag when this
# chart is activated and the placeholder template is replaced with
# real StatefulSet / Service / catalog-integration manifests.
appVersion: "0.0.0-shell"
keywords:
  - fluss
  - deprecated
  - real-time
  - bigdata
  - data-platform
  - shell
home: https://fluss.apache.org/
sources:
  - https://github.com/xenoISA/isA_Cloud
  - https://github.com/apache/fluss
maintainers:
  - name: isA Platform
