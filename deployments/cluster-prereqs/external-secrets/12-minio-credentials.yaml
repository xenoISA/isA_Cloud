# MinIO root credentials + S3A access keys.
# Synced into K8s Secret `minio-credentials` in the `isa-bigdata`
# namespace. Consumed by:
#   - minio chart (existingSecret reads rootUser / rootPassword)
#   - hive-metastore chart (s3a.auth.existingSecret reads access-key / secret-key)
#   - flink chart (env injection reads access-key / secret-key)
#   - iceberg-tools smoke job (same access-key / secret-key)
# All four keys must point at the SAME credentials so MinIO clients
# and the MinIO server agree.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-credentials
  namespace: isa-bigdata
  labels:
    app.kubernetes.io/part-of: isa-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: isa-bigdata-vault
    kind: ClusterSecretStore
  target:
    name: minio-credentials
    creationPolicy: Owner
  data:
    # Hive-metastore + Flink + iceberg-tools (S3A client convention)
    - secretKey: access-key
      remoteRef:
        key: isa-bigdata/minio-credentials
        property: access-key
    - secretKey: secret-key
      remoteRef:
        key: isa-bigdata/minio-credentials
        property: secret-key
    # MinIO server itself (upstream chart convention) — typically the
    # SAME values as access-key / secret-key but kept as separate
    # property keys so vault rotation can update them in lockstep.
    - secretKey: rootUser
      remoteRef:
        key: isa-bigdata/minio-credentials
        property: rootUser
    - secretKey: rootPassword
      remoteRef:
        key: isa-bigdata/minio-credentials
        property: rootPassword
