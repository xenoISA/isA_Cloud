# =============================================================================
# ClusterSecretStore — vault backend for the isa-bigdata Secrets
# =============================================================================
# Maps ExternalSecret CRs to the customer's vault. The companion
# `bootstrap-vault-secrets.sh` script writes the actual secret values
# at the canonical paths under `secret/data/isa-bigdata/`.
#
# Adjust `server` to the customer's vault address + the auth method
# section to whichever vault auth path the customer uses (kubernetes
# auth via ServiceAccount is the default below; appRole / token /
# AWS / Azure variants are supported by ESO and can be swapped here).
# =============================================================================

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: isa-bigdata-vault
  labels:
    app.kubernetes.io/part-of: isa-platform
spec:
  provider:
    vault:
      # Vault address. Override per environment via Kustomize / Helm
      # values overlay or by editing this file directly.
      server: "http://vault.vault.svc.cluster.local:8200"

      # KV-v2 mount path. Standard `secret/` mount; change if your
      # vault uses a different mount.
      path: "secret"
      version: "v2"

      # Vault Kubernetes auth — operator pod's ServiceAccount is mapped
      # to a vault role with read access to `secret/data/isa-bigdata/*`.
      # Configure the role separately in vault before applying.
      auth:
        kubernetes:
          # Vault auth path. Default is `kubernetes`; some sites mount
          # multiple auth backends as `kubernetes-prod` etc.
          mountPath: "kubernetes"

          # Vault role granting read on secret/data/isa-bigdata/* —
          # create with `vault write auth/kubernetes/role/isa-bigdata-reader …`.
          role: "isa-bigdata-reader"

          # ServiceAccount that ESO's controller authenticates as.
          # Default ESO SA is `external-secrets` in the
          # `external-secrets` namespace.
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
