# StarRocks root password.
# Synced into K8s Secret `starrocks-root-credentials` in the
# `isa-bigdata` namespace; consumed by the starrocks chart's
# `kube-starrocks.starrocks.initPassword.passwordSecret` and by
# the catalog-init Job's `rootPasswordSecret`.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: starrocks-root-credentials
  namespace: isa-bigdata
  labels:
    app.kubernetes.io/part-of: isa-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: isa-bigdata-vault
    kind: ClusterSecretStore
  target:
    name: starrocks-root-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: isa-bigdata/starrocks-root-credentials
        property: password
