# Apicurio Registry → postgres-bigdata.apicurio database credentials.
# Synced into K8s Secret `apicurio-registry-db` in the `isa-bigdata`
# namespace; consumed by the apicurio-registry chart's
# `db.auth.existingSecret` reference in customer-prod.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: apicurio-registry-db
  namespace: isa-bigdata
  labels:
    app.kubernetes.io/part-of: isa-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: isa-bigdata-vault
    kind: ClusterSecretStore
  target:
    name: apicurio-registry-db
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: isa-bigdata/apicurio-registry-db
        property: username
    - secretKey: password
      remoteRef:
        key: isa-bigdata/apicurio-registry-db
        property: password
