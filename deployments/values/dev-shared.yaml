# =============================================================================
# isa-bigdata umbrella — dev-shared profile
# =============================================================================
# Team-shared dev cluster (per bigdata-architecture.md §4.1). Sits between
# kind-local (single-broker, ephemeral) and customer-prod (3 brokers,
# 80Ti iSCSI, mTLS). 1-broker Kafka with persistent storage so multiple
# devs can keep state across redeploys without paying the prod footprint.
# =============================================================================

kafka:
  name: kafka
  namespace: isa-bigdata
  nodePool:
    name: dual
    replicas: 1
    roles:
      - controller
      - broker
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi
    jvmOptions:
      "-Xms": "1024m"
      "-Xmx": "1024m"
  storage:
    type: persistent-claim
    size: 50Gi
    # Empty class falls back to the cluster default StorageClass — dev
    # clusters typically run a generic CSI provisioner.
    class: ""
    deleteClaim: false
  listeners:
    plain:
      enabled: true
      port: 9092
    tls:
      enabled: true
      port: 9093
    external:
      enabled: false
  tls:
    # No mTLS in dev — devs change client identity often. TLS-without-auth
    # still encrypts in transit; auth comes back in customer-prod.
    mtls: false
  config:
    offsets.topic.replication.factor: 1
    transaction.state.log.replication.factor: 1
    transaction.state.log.min.isr: 1
    default.replication.factor: 1
    min.insync.replicas: 1
    log.retention.hours: 72
    compression.type: zstd
  metrics:
    enabled: true
    renderConfigMap: true
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus
  podAntiAffinity:
    enabled: false
  networkPolicy:
    enabled: false
  entityOperator:
    enabled: true

apicurio-registry:
  name: apicurio-registry
  namespace: isa-bigdata
  replicas: 1
  registry:
    compatibilityLevel: BACKWARD
    authEnabled: false
  db:
    host: bigdata-postgresql.isa-bigdata.svc.cluster.local
    port: 5432
    name: apicurio
    auth:
      create: false
      existingSecret: apicurio-registry-db
  metrics:
    enabled: true
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus
  podDisruptionBudget:
    enabled: false
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  networkPolicy:
    enabled: false

postgres-bigdata:
  postgresql:
    architecture: standalone
    auth:
      enablePostgresUser: true
      # All credentials sourced from a pre-provisioned Secret (created by
      # the operator or external-secrets in the dev cluster). Required
      # keys: postgres-password, password, replication-password.
      existingSecret: postgres-bigdata-auth
      username: bigdata
      database: bigdata
    primary:
      persistence:
        enabled: true
        storageClass: ""
        size: 50Gi
      resources:
        requests:
          cpu: 250m
          memory: 1Gi
        limits:
          cpu: "1"
          memory: 2Gi
      # initdb runs once on first startup; consumer Secrets must already
      # exist in-cluster (apicurio-registry-db, hive-metastore-db,
      # dataphin-db) so downstream charts can `existingSecret`-reference
      # the same passwords used here. To keep initdb deterministic we
      # bake the consumer passwords directly — for non-shared secrets
      # bypass this profile and use customer-prod's `initdb: scripts: {}`.
      initdb:
        scripts:
          02-bigdata-consumers.sql: |
            CREATE USER apicurio WITH PASSWORD 'CHANGE_ME_DEV_APICURIO';
            CREATE DATABASE apicurio OWNER apicurio;
            GRANT ALL PRIVILEGES ON DATABASE apicurio TO apicurio;

            CREATE USER hive_metastore WITH PASSWORD 'CHANGE_ME_DEV_HMS';
            CREATE DATABASE hive_metastore OWNER hive_metastore;
            GRANT ALL PRIVILEGES ON DATABASE hive_metastore TO hive_metastore;

            CREATE USER dataphin WITH PASSWORD 'CHANGE_ME_DEV_DATAPHIN';
            CREATE DATABASE dataphin OWNER dataphin;
            GRANT ALL PRIVILEGES ON DATABASE dataphin TO dataphin;
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        labels:
          release: prometheus

hive-metastore:
  name: hive-metastore
  namespace: isa-bigdata
  replicas: 1
  db:
    host: bigdata-postgresql.isa-bigdata.svc.cluster.local
    port: 5432
    name: hive_metastore
    auth:
      create: false
      existingSecret: hive-metastore-db
  schemaInit:
    enabled: true
  warehouse:
    dir: "s3a://paimon/warehouse/"
  s3a:
    enabled: true
    endpoint: "http://minio.isa-bigdata.svc.cluster.local:9000"
    pathStyleAccess: true
    auth:
      create: false
      existingSecret: minio-credentials
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi
  jvm:
    xms: "512m"
    xmx: "1024m"
  podDisruptionBudget:
    enabled: false
  networkPolicy:
    enabled: false
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus

minio:
  # Secret pre-provisioned by the dev cluster operator. Required keys:
  # access-key, secret-key, rootUser, rootPassword (rootUser/Password
  # consumed by upstream chart; access-key/secret-key by hive-metastore).
  auth:
    create: false
    secretName: minio-credentials
  minio:
    mode: standalone
    replicas: 1
    existingSecret: minio-credentials
    persistence:
      enabled: true
      size: 50Gi
      storageClass: ""
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
    service:
      type: ClusterIP
      port: 9000
    consoleService:
      type: ClusterIP
      port: 9001
    buckets:
      - name: paimon
        policy: none
        purge: false
      - name: flink-checkpoints
        policy: none
        purge: false
      - name: dataphin-export
        policy: none
        purge: false
    podDisruptionBudget:
      enabled: false
    networkPolicy:
      enabled: false
    metrics:
      serviceMonitor:
        enabled: true
        labels:
          release: prometheus

paimon-tools:
  init:
    enabled: true

starrocks:
  rootPassword:
    create: false
  catalogInit:
    enabled: true
  kube-starrocks:
    operator:
      starrocksOperator:
        replicaCount: 1
    starrocks:
      starrocksFESpec:
        replicas: 1
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "1"
            memory: 2Gi
        storageSpec:
          name: fe-meta
          storageClassName: ""
          storageSize: 10Gi
      starrocksBeSpec:
        replicas: 1
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "2"
            memory: 4Gi
        storageSpec:
          name: be-storage
          storageClassName: ""
          storageSize: 50Gi

flink:
  session:
    jobManager:
      replicas: 1
      resource:
        cpu: 2
        memory: "4Gi"
    taskManager:
      replicas: 1
      resource:
        cpu: 2
        memory: "4Gi"
      numberOfTaskSlots: 4
    flinkConfiguration:
      jobmanager.memory.process.size: "4g"
      taskmanager.memory.process.size: "4g"
  networkPolicy:
    enabled: false

flink-cdc-jobs:
  defaults:
    parallelism: 2
    upgradeMode: stateless
  sources:
    - name: amazon_ads
      enabled: true
      parallelism: 2
      sql: |
        SET 'pipeline.name' = 'flink-cdc-stub-amazon-ads';

        CREATE CATALOG paimon WITH ('type' = 'paimon');

        CREATE TABLE IF NOT EXISTS paimon.`default`.`stub_amazon_ads` (
          campaign_id STRING,
          report_date DATE,
          impressions BIGINT,
          PRIMARY KEY (campaign_id, report_date) NOT ENFORCED
        ) WITH ('bucket' = '2', 'changelog-producer' = 'input');

        INSERT INTO paimon.`default`.`stub_amazon_ads`
        VALUES ('STUB-CAMPAIGN', DATE '1970-01-01', 0);
    - name: walmart_connect
      enabled: true
      parallelism: 2
      sql: |
        SET 'pipeline.name' = 'flink-cdc-stub-walmart-connect';

        CREATE CATALOG paimon WITH ('type' = 'paimon');

        CREATE TABLE IF NOT EXISTS paimon.`default`.`stub_walmart_connect` (
          campaign_id STRING,
          report_date DATE,
          impressions BIGINT,
          PRIMARY KEY (campaign_id, report_date) NOT ENFORCED
        ) WITH ('bucket' = '2', 'changelog-producer' = 'input');

        INSERT INTO paimon.`default`.`stub_walmart_connect`
        VALUES ('STUB-CAMPAIGN', DATE '1970-01-01', 0);
    - name: shopify
      enabled: true
      parallelism: 2
      sql: |
        SET 'pipeline.name' = 'flink-cdc-stub-shopify';

        CREATE CATALOG paimon WITH ('type' = 'paimon');

        CREATE TABLE IF NOT EXISTS paimon.`default`.`stub_shopify` (
          product_id STRING,
          variant_id STRING,
          updated_at TIMESTAMP(3),
          PRIMARY KEY (product_id, variant_id) NOT ENFORCED
        ) WITH ('bucket' = '2', 'changelog-producer' = 'input');

        INSERT INTO paimon.`default`.`stub_shopify`
        VALUES ('STUB-PRODUCT', 'STUB-VARIANT', TIMESTAMP '1970-01-01 00:00:00');
