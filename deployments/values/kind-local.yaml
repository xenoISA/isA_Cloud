# =============================================================================
# isa-bigdata umbrella — kind-local profile
# =============================================================================
# W2 verification target. Single broker, ephemeral PG-less Apicurio (kind
# doesn't have a shared postgres-bigdata yet, so we render the auth Secret
# in-cluster and assume a kind-local Postgres lives at the host below).
# =============================================================================

kafka:
  name: kafka
  namespace: isa-bigdata
  nodePool:
    name: dual
    replicas: 1
    roles:
      - controller
      - broker
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi
    jvmOptions:
      "-Xms": "512m"
      "-Xmx": "512m"
  storage:
    type: persistent-claim
    size: 20Gi
    class: local-path
    deleteClaim: true
  listeners:
    plain:
      enabled: true
      port: 9092
    tls:
      enabled: false
      port: 9093
    external:
      enabled: false
  tls:
    mtls: false
  config:
    offsets.topic.replication.factor: 1
    transaction.state.log.replication.factor: 1
    transaction.state.log.min.isr: 1
    default.replication.factor: 1
    min.insync.replicas: 1
    log.retention.hours: 24
    compression.type: zstd
  metrics:
    enabled: true
    renderConfigMap: true
  serviceMonitor:
    enabled: false
  podAntiAffinity:
    enabled: false
  networkPolicy:
    enabled: false
  entityOperator:
    enabled: false

apicurio-registry:
  name: apicurio-registry
  namespace: isa-bigdata
  replicas: 1
  registry:
    compatibilityLevel: BACKWARD
    authEnabled: false
  db:
    # Targets the postgres-bigdata chart's primary Service. The bitnami
    # postgresql chart names its primary Service `<release>-postgresql`
    # by default; helm install bigdata umbrella puts the release at
    # `bigdata-postgresql`. Override here if you install with a different
    # release name.
    host: bigdata-postgresql.isa-bigdata.svc.cluster.local
    port: 5432
    name: apicurio
    auth:
      create: true
      username: apicurio
      password: apicurio-kind
  metrics:
    enabled: true
  serviceMonitor:
    enabled: false
  podDisruptionBudget:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  networkPolicy:
    enabled: false

postgres-bigdata:
  postgresql:
    architecture: standalone
    auth:
      enablePostgresUser: true
      postgresPassword: kind-postgres-password
      username: bigdata
      password: kind-bigdata-password
      database: bigdata
    primary:
      persistence:
        enabled: true
        storageClass: local-path
        size: 4Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      initdb:
        scripts:
          02-bigdata-consumers.sql: |
            -- Pre-create the per-consumer roles and databases so downstream
            -- charts (apicurio-registry, hive-metastore, dataphin) can
            -- connect with their own credentials. Passwords match the
            -- existingSecret values rendered by each consumer chart in
            -- kind-local mode.
            CREATE USER apicurio WITH PASSWORD 'apicurio-kind';
            CREATE DATABASE apicurio OWNER apicurio;
            GRANT ALL PRIVILEGES ON DATABASE apicurio TO apicurio;

            CREATE USER hive_metastore WITH PASSWORD 'hms-kind';
            CREATE DATABASE hive_metastore OWNER hive_metastore;
            GRANT ALL PRIVILEGES ON DATABASE hive_metastore TO hive_metastore;

            CREATE USER dataphin WITH PASSWORD 'dataphin-kind';
            CREATE DATABASE dataphin OWNER dataphin;
            GRANT ALL PRIVILEGES ON DATABASE dataphin TO dataphin;
    metrics:
      enabled: true
      serviceMonitor:
        enabled: false

hive-metastore:
  name: hive-metastore
  namespace: isa-bigdata
  replicas: 1
  db:
    host: bigdata-postgresql.isa-bigdata.svc.cluster.local
    port: 5432
    name: hive_metastore
    auth:
      create: true
      username: hive_metastore
      password: hms-kind
  schemaInit:
    enabled: true
  warehouse:
    dir: "s3a://paimon/warehouse/"
  s3a:
    enabled: true
    endpoint: "http://minio.isa-bigdata.svc.cluster.local:9000"
    pathStyleAccess: true
    auth:
      create: true
      accessKey: minio-kind
      secretKey: minio-kind-secret
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  jvm:
    xms: "256m"
    xmx: "512m"
  podDisruptionBudget:
    enabled: false
  networkPolicy:
    enabled: false
  serviceMonitor:
    enabled: false

minio:
  auth:
    create: true
    secretName: minio-credentials
    rootUser: minio-kind
    rootPassword: minio-kind-secret
  minio:
    mode: standalone
    replicas: 1
    existingSecret: minio-credentials
    persistence:
      enabled: true
      size: 20Gi
      storageClass: local-path
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    service:
      type: ClusterIP
      port: 9000
    consoleService:
      # NodePort in kind so devs can poke the Console at http://<node>:30901
      type: NodePort
      port: 9001
      nodePort: 30901
    buckets:
      - name: paimon
        policy: none
        purge: false
      - name: flink-checkpoints
        policy: none
        purge: false
      - name: dataphin-export
        policy: none
        purge: false
    podDisruptionBudget:
      enabled: false
    networkPolicy:
      enabled: false
    metrics:
      serviceMonitor:
        enabled: false

paimon-tools:
  init:
    enabled: true
