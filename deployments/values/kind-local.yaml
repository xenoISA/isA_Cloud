# =============================================================================
# isa-bigdata umbrella — kind-local profile
# =============================================================================
# W2 verification target. Single broker, ephemeral PG-less Apicurio (kind
# doesn't have a shared postgres-bigdata yet, so we render the auth Secret
# in-cluster and assume a kind-local Postgres lives at the host below).
# =============================================================================

kafka:
  name: kafka
  namespace: isa-bigdata
  nodePool:
    name: dual
    replicas: 1
    roles:
      - controller
      - broker
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi
    jvmOptions:
      "-Xms": "512m"
      "-Xmx": "512m"
  storage:
    type: persistent-claim
    size: 20Gi
    class: standard
    deleteClaim: true
  listeners:
    plain:
      enabled: true
      port: 9092
    tls:
      enabled: false
      port: 9093
    external:
      enabled: false
  tls:
    mtls: false
  config:
    offsets.topic.replication.factor: 1
    transaction.state.log.replication.factor: 1
    transaction.state.log.min.isr: 1
    default.replication.factor: 1
    min.insync.replicas: 1
    log.retention.hours: 24
    compression.type: zstd
  metrics:
    enabled: true
    renderConfigMap: true
  serviceMonitor:
    enabled: false
  podAntiAffinity:
    enabled: false
  networkPolicy:
    enabled: false
  entityOperator:
    enabled: false

apicurio-registry:
  name: apicurio-registry
  namespace: isa-bigdata
  replicas: 1
  registry:
    compatibilityLevel: BACKWARD
    authEnabled: false
  db:
    # Targets the postgres-bigdata chart's primary Service. The bitnami
    # postgresql chart names its primary Service `<release>-postgresql`
    # by default; helm install bigdata umbrella puts the release at
    # `bigdata-postgresql`. Override here if you install with a different
    # release name.
    host: bigdata-postgresql.isa-bigdata.svc.cluster.local
    port: 5432
    name: apicurio
    auth:
      create: true
      username: apicurio
      password: apicurio-kind
  metrics:
    enabled: true
  serviceMonitor:
    enabled: false
  podDisruptionBudget:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  networkPolicy:
    enabled: false

postgres-bigdata:
  postgresql:
    architecture: standalone
    auth:
      enablePostgresUser: true
      postgresPassword: kind-postgres-password
      username: bigdata
      password: kind-bigdata-password
      database: bigdata
    primary:
      persistence:
        enabled: true
        storageClass: standard
        size: 4Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      initdb:
        scripts:
          02-bigdata-consumers.sql: |
            -- Pre-create the per-consumer roles and databases so downstream
            -- charts (apicurio-registry, hive-metastore, dataphin) can
            -- connect with their own credentials. Passwords match the
            -- existingSecret values rendered by each consumer chart in
            -- kind-local mode.
            CREATE USER apicurio WITH PASSWORD 'apicurio-kind';
            CREATE DATABASE apicurio OWNER apicurio;
            GRANT ALL PRIVILEGES ON DATABASE apicurio TO apicurio;

            CREATE USER hive_metastore WITH PASSWORD 'hms-kind';
            CREATE DATABASE hive_metastore OWNER hive_metastore;
            GRANT ALL PRIVILEGES ON DATABASE hive_metastore TO hive_metastore;

            CREATE USER dataphin WITH PASSWORD 'dataphin-kind';
            CREATE DATABASE dataphin OWNER dataphin;
            GRANT ALL PRIVILEGES ON DATABASE dataphin TO dataphin;
    metrics:
      enabled: true
      serviceMonitor:
        enabled: false

hive-metastore:
  name: hive-metastore
  namespace: isa-bigdata
  replicas: 1
  db:
    host: bigdata-postgresql.isa-bigdata.svc.cluster.local
    port: 5432
    name: hive_metastore
    auth:
      create: true
      username: hive_metastore
      password: hms-kind
  schemaInit:
    enabled: true
  warehouse:
    dir: "s3a://lake/warehouse/"
  s3a:
    enabled: true
    # Service name is bigdata-minio (chart wraps minio with release-prefix
    # — bigdata-minio.isa-bigdata.svc.cluster.local), NOT minio.
    endpoint: "http://bigdata-minio.isa-bigdata.svc.cluster.local:9000"
    pathStyleAccess: true
    auth:
      # Reuse the `minio-credentials` Secret created by the minio
      # chart — it already exposes access-key / secret-key with the
      # right values. Setting create: true here would render a
      # duplicate Secret with the same name and helm refuses the
      # install with `no Secret with the name "minio-credentials" found`
      # because the duplicate-name conflict-detector swallows one
      # before validation.
      create: false
      existingSecret: minio-credentials
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  jvm:
    xms: "256m"
    xmx: "512m"
  podDisruptionBudget:
    enabled: false
  networkPolicy:
    enabled: false
  serviceMonitor:
    enabled: false

minio:
  auth:
    create: true
    secretName: minio-credentials
    rootUser: minio-kind
    rootPassword: minio-kind-secret
  minio:
    mode: standalone
    replicas: 1
    existingSecret: minio-credentials
    persistence:
      enabled: true
      size: 20Gi
      storageClass: standard
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    service:
      type: ClusterIP
      port: 9000
    consoleService:
      # NodePort in kind so devs can poke the Console at http://<node>:30911.
      # 30911 (not 30901) — the platform-tier MinIO chart in
      # isa-cloud-local already claims 30901 for its console; allocating
      # it twice fails with `provided port is already allocated`. The
      # bigdata-tier MinIO is a separate cluster (different bucket layout,
      # different credentials) and gets its own NodePort.
      type: NodePort
      port: 9001
      nodePort: 30911
    buckets:
      - name: lake
        policy: none
        purge: false
      - name: flink-checkpoints
        policy: none
        purge: false
      - name: dataphin-export
        policy: none
        purge: false
    podDisruptionBudget:
      enabled: false
    networkPolicy:
      enabled: false
    metrics:
      serviceMonitor:
        enabled: false

iceberg-tools:
  # Override S3A endpoint — minio chart renders its Service as
  # `bigdata-minio` (release prefix), not `minio`.
  s3a:
    endpoint: "http://bigdata-minio.isa-bigdata.svc.cluster.local:9000"
  init:
    enabled: true
    # Override the chart-default probe targets — same reason as above.
    probeHosts:
      - host: hive-metastore.isa-bigdata.svc.cluster.local
        port: 9083
        label: hive-metastore-thrift
      - host: bigdata-minio.isa-bigdata.svc.cluster.local
        port: 9000
        label: minio-s3
    bucketProbe:
      endpoint: "http://bigdata-minio.isa-bigdata.svc.cluster.local:9000"
      bucket: lake

starrocks:
  rootPassword:
    create: true
    password: starrocks-kind
  catalogInit:
    enabled: true
    catalog:
      # Override default — minio Service is bigdata-minio in the
      # umbrella (release prefix), not minio.
      name: iceberg_hms
      hiveMetastoreUri: thrift://hive-metastore.isa-bigdata.svc.cluster.local:9083
      s3Endpoint: http://bigdata-minio.isa-bigdata.svc.cluster.local:9000
      s3PathStyleAccess: true
      s3SslEnabled: false
  kube-starrocks:
    operator:
      starrocksOperator:
        replicaCount: 1
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
    starrocks:
      starrocksFESpec:
        replicas: 1
        resources:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            cpu: "1"
            memory: 2Gi
        storageSpec:
          name: fe-meta
          storageClassName: standard
          storageSize: 5Gi
      starrocksBeSpec:
        replicas: 1
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 4Gi
        storageSpec:
          name: be-storage
          storageClassName: standard
          storageSize: 20Gi

flink:
  session:
    image:
      tag: "1.20.0-scala_2.12-java17"
    jobManager:
      replicas: 1
      resource:
        cpu: 1
        memory: "2Gi"
    taskManager:
      replicas: 1
      resource:
        cpu: 1
        memory: "2Gi"
      numberOfTaskSlots: 2
    flinkConfiguration:
      jobmanager.memory.process.size: "2g"
      taskmanager.memory.process.size: "2g"
      # Override default — minio Service is bigdata-minio (release prefix).
      s3.endpoint: "http://bigdata-minio.isa-bigdata.svc.cluster.local:9000"
  networkPolicy:
    enabled: false
  podDisruptionBudget:
    jobManager:
      enabled: false
    taskManager:
      enabled: false

flink-cdc-jobs:
  defaults:
    parallelism: 1
    upgradeMode: stateless
  # 3 P0 sources from sn-commercial-tower data_platform/sources/. SQL is
  # a stub that uses VALUES literals as a stand-in for the Kafka source
  # — proves the runner-jar + iceberg-catalog mount + S3A creds path works
  # without needing real producers. Replace with real DDL in W7+.
  sources:
    - name: amazon_ads
      enabled: true
      parallelism: 1
      sql: |
        SET 'pipeline.name' = 'flink-cdc-stub-amazon-ads';

        CREATE CATALOG iceberg WITH (
          'type' = 'iceberg',
          'catalog-type' = 'hive',
          'uri' = 'thrift://hive-metastore.isa-bigdata.svc.cluster.local:9083',
          'warehouse' = 's3a://lake/warehouse/'
        );

        CREATE TABLE IF NOT EXISTS iceberg.`default`.`stub_amazon_ads` (
          campaign_id STRING,
          report_date DATE,
          impressions BIGINT
        )
        PARTITIONED BY (report_date)
        WITH ('format-version' = '2');

        INSERT INTO iceberg.`default`.`stub_amazon_ads`
        VALUES ('STUB-CAMPAIGN', DATE '1970-01-01', 0);
    - name: walmart_connect
      enabled: true
      parallelism: 1
      sql: |
        SET 'pipeline.name' = 'flink-cdc-stub-walmart-connect';

        CREATE CATALOG iceberg WITH (
          'type' = 'iceberg',
          'catalog-type' = 'hive',
          'uri' = 'thrift://hive-metastore.isa-bigdata.svc.cluster.local:9083',
          'warehouse' = 's3a://lake/warehouse/'
        );

        CREATE TABLE IF NOT EXISTS iceberg.`default`.`stub_walmart_connect` (
          campaign_id STRING,
          report_date DATE,
          impressions BIGINT
        )
        PARTITIONED BY (report_date)
        WITH ('format-version' = '2');

        INSERT INTO iceberg.`default`.`stub_walmart_connect`
        VALUES ('STUB-CAMPAIGN', DATE '1970-01-01', 0);
    - name: shopify
      enabled: true
      parallelism: 1
      sql: |
        SET 'pipeline.name' = 'flink-cdc-stub-shopify';

        CREATE CATALOG iceberg WITH (
          'type' = 'iceberg',
          'catalog-type' = 'hive',
          'uri' = 'thrift://hive-metastore.isa-bigdata.svc.cluster.local:9083',
          'warehouse' = 's3a://lake/warehouse/'
        );

        CREATE TABLE IF NOT EXISTS iceberg.`default`.`stub_shopify` (
          product_id STRING,
          variant_id STRING,
          updated_at TIMESTAMP(3)
        )
        WITH ('format-version' = '2');

        INSERT INTO iceberg.`default`.`stub_shopify`
        VALUES ('STUB-PRODUCT', 'STUB-VARIANT', TIMESTAMP '1970-01-01 00:00:00');
