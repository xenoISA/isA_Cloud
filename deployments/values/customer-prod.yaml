# =============================================================================
# isa-bigdata umbrella — customer-prod profile
# =============================================================================
# W4 production target. 3-broker Strimzi Kafka with iSCSI persistent claims,
# mTLS, anti-affinity, and a dedicated NetworkPolicy. Apicurio runs 2
# replicas against the shared postgresql-bigdata cluster.
# =============================================================================

kafka:
  name: kafka
  namespace: isa-bigdata
  nodePool:
    name: dual
    replicas: 3
    roles:
      - controller
      - broker
    resources:
      requests:
        cpu: "2"
        memory: 8Gi
      limits:
        cpu: "4"
        memory: 12Gi
    jvmOptions:
      "-Xms": "4096m"
      "-Xmx": "4096m"
  storage:
    type: persistent-claim
    size: 80Ti
    class: infortrend-iscsi
    deleteClaim: false
  listeners:
    plain:
      enabled: false
      port: 9092
    tls:
      enabled: true
      port: 9093
    external:
      enabled: false
  tls:
    mtls: true
  config:
    offsets.topic.replication.factor: 3
    transaction.state.log.replication.factor: 3
    transaction.state.log.min.isr: 2
    default.replication.factor: 3
    min.insync.replicas: 2
    log.retention.hours: 168
    compression.type: zstd
  metrics:
    enabled: true
    renderConfigMap: true
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus
  podAntiAffinity:
    enabled: true
    topologyKey: kubernetes.io/hostname
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          strimzi.io/cluster: kafka
  priorityClassName: infra-critical
  networkPolicy:
    enabled: true
    allowedNamespaces:
      - isa-bigdata
      - isa-data
      - isa-mcp
  entityOperator:
    enabled: true

apicurio-registry:
  name: apicurio-registry
  namespace: isa-bigdata
  replicas: 2
  registry:
    compatibilityLevel: BACKWARD
    authEnabled: false
  db:
    host: bigdata-postgresql.isa-bigdata.svc.cluster.local
    port: 5432
    name: apicurio
    auth:
      create: false
      existingSecret: apicurio-registry-db
  metrics:
    enabled: true
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus
  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app: apicurio-registry
  priorityClassName: infra-critical
  networkPolicy:
    enabled: true
    allowedNamespaces:
      - isa-bigdata
      - isa-data
      - isa-mcp

postgres-bigdata:
  postgresql:
    # 1 primary + 2 read replicas via bitnami's replication architecture.
    # No automatic failover — manual promotion only. Switch to
    # bitnami/postgresql-ha later if true HA is needed.
    architecture: replication
    auth:
      enablePostgresUser: true
      # Required: external-secrets / vault provisions this Secret with
      # keys postgres-password, password, replication-password. initdb
      # is intentionally empty — operators pre-create users + databases
      # via a separate provisioning job so passwords never appear in
      # values files.
      existingSecret: postgres-bigdata-auth
      username: bigdata
      database: bigdata
    primary:
      persistence:
        enabled: true
        storageClass: infortrend-iscsi
        size: 500Gi
      resources:
        requests:
          cpu: "2"
          memory: 8Gi
        limits:
          cpu: "4"
          memory: 16Gi
      priorityClassName: infra-critical
      podAntiAffinityPreset: hard
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
              app.kubernetes.io/component: primary
      pdb:
        create: true
        minAvailable: 1
      # No initdb — users + databases pre-provisioned by external job.
      initdb:
        scripts: {}
    readReplicas:
      replicaCount: 2
      persistence:
        enabled: true
        storageClass: infortrend-iscsi
        size: 500Gi
      resources:
        requests:
          cpu: "2"
          memory: 8Gi
        limits:
          cpu: "4"
          memory: 16Gi
      priorityClassName: infra-critical
      podAntiAffinityPreset: hard
      pdb:
        create: true
        minAvailable: 1
    networkPolicy:
      enabled: true
      ingressRules:
        primaryAccessOnlyFrom:
          enabled: true
          customRules:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: isa-bigdata
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: isa-data
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: isa-mcp
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        labels:
          release: prometheus

hive-metastore:
  name: hive-metastore
  namespace: isa-bigdata
  # Active-active HMS — multiple replicas all backed by the same Postgres.
  # No automatic failover needed; clients (Flink CDC, Dataphin, StarRocks)
  # round-robin via the ClusterIP Service.
  replicas: 2
  db:
    host: bigdata-postgresql.isa-bigdata.svc.cluster.local
    port: 5432
    name: hive_metastore
    auth:
      create: false
      existingSecret: hive-metastore-db
  # Operator pre-runs schematool via a vault-driven Job before the chart
  # is installed; disabling the Helm hook prevents a re-install from
  # racing the live database.
  schemaInit:
    enabled: false
  warehouse:
    dir: "s3a://paimon/warehouse/"
  s3a:
    enabled: true
    # Override once the minio chart lands; for now points at the planned
    # minio Service in isa-bigdata.
    endpoint: "http://minio.isa-bigdata.svc.cluster.local:9000"
    pathStyleAccess: true
    auth:
      create: false
      existingSecret: minio-credentials
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 6Gi
  jvm:
    xms: "2048m"
    xmx: "4096m"
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app: hive-metastore
          topologyKey: kubernetes.io/hostname
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app: hive-metastore
  priorityClassName: infra-critical
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  networkPolicy:
    enabled: true
    allowedNamespaces:
      - isa-bigdata
      - isa-data
      - isa-mcp
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus
