# pgbouncer-auth: rendered by ESO from Vault (consistent with isa-platform-secrets).
# Seed Vault path isa-cloud/production/pgbouncer with:
#   admin-username, admin-password, stats-username, stats-password
#   userlist          -> full userlist.txt contents (SCRAM rows), e.g.
#                        "postgres" "SCRAM-SHA-256$4096:....."
#                        (the postgres role's rolpassword from pg_authid)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pgbouncer-auth
  namespace: sn-cloud-production
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: pgbouncer-auth
    creationPolicy: Owner
  data:
    - secretKey: admin-username
      remoteRef: {key: isa-cloud/production/pgbouncer, property: admin-username}
    - secretKey: admin-password
      remoteRef: {key: isa-cloud/production/pgbouncer, property: admin-password}
    - secretKey: stats-username
      remoteRef: {key: isa-cloud/production/pgbouncer, property: stats-username}
    - secretKey: stats-password
      remoteRef: {key: isa-cloud/production/pgbouncer, property: stats-password}
    - secretKey: userlist.txt
      remoteRef: {key: isa-cloud/production/pgbouncer, property: userlist}
