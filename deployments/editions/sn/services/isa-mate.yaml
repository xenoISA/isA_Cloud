name: isa-mate
image:
  repository: isa/isa-mate
  # 0.1.11/0.1.12: marketplace skill registry persisted to Redis (shared) instead
  # of a pod-local in-memory dict — create/update/delete were inconsistent across
  # replicas (isA_Mate#605). 0.1.12 patches the installed site-packages copy (the
  # app runs as the `isa-mate` console script, not from /app).
  tag: "0.1.12"
port: 18789
replicas: 1
resources:
  requests: {cpu: "200m", memory: "256Mi"}
  limits: {cpu: "1", memory: "1Gi"}
health: {path: /health, initialDelaySeconds: 15, periodSeconds: 10}
liveness: {path: /health, initialDelaySeconds: 40, periodSeconds: 20}

# HA + autoscale (perf 2026-06-09). SERVICE_HOST=podIP injected by chart.
autoscaling: {enabled: true, minReplicas: 2, maxReplicas: 4, targetCPUUtilization: 70}
