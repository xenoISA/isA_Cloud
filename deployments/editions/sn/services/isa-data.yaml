# isa_data — data platform service (FastAPI, :8084). Standard infra via base.
name: isa-data
image:
  repository: isa/isa-data
  tag: "0.1.4"
port: 8084
replicas: 1
resources:
  requests: {cpu: "250m", memory: "512Mi"}
  limits: {cpu: "2", memory: "4Gi"}
health: {path: /health, initialDelaySeconds: 15, periodSeconds: 10}
liveness: {path: /health, initialDelaySeconds: 40, periodSeconds: 20}

# HA + autoscale (perf 2026-06-09). SERVICE_HOST=podIP injected by chart.
autoscaling: {enabled: true, minReplicas: 2, maxReplicas: 4, targetCPUUtilization: 70}
