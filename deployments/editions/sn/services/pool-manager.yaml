# pool-manager — isA_OS browser/compute pool manager (:8090). Standard infra via isa-svc-base.
# NOTE (#320 dependency): see cloud-os.yaml — isA_OS must publish an `isa-os-pool-manager` image
# in the platform release; CONFIRM the final image name + tag against platform-vX.Y.Z before cutover.
name: pool-manager
image:
  repository: isa/isa-os-pool-manager
  tag: "0.1.3"  # placeholder — pinned by platform release (#320)
port: 8090
replicas: 2
resources:
  requests: {cpu: "500m", memory: "1Gi"}
  limits: {cpu: "2", memory: "4Gi"}
health: {path: /health, initialDelaySeconds: 15, periodSeconds: 10}
liveness: {path: /health, initialDelaySeconds: 40, periodSeconds: 20}
autoscaling: {enabled: true, minReplicas: 2, maxReplicas: 4, targetCPUUtilization: 70}
