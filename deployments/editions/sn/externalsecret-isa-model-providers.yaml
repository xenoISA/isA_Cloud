# External LLM provider API keys for isa-model (issue: external API mode 503s).
#
# WHY A SEPARATE ExternalSecret (not added to isa-platform-secrets):
# ESO fails the ENTIRE sync of an ExternalSecret if any listed remoteRef property
# is missing in Vault. Keeping provider keys here isolates that risk from the
# critical infra secret (postgres/redis/minio) — a missing/unseeded provider key
# only degrades external-API mode, never infra. isa-model consumes this via
# `extraSecretRefs` with optional:true, so the pod starts even before it syncs.
#
# config_manager.py enables a provider iff its env-var key is present:
#   OPENAI_API_KEY, ANTHROPIC_API_KEY, CEREBRAS_API_KEY, OPENROUTER_API_KEY,
#   GOOGLE_API_KEY/GEMINI_API_KEY, REPLICATE_API_TOKEN
# secretKey == env-var name (consumed via envFrom).
#
# BEFORE APPLYING: seed the Vault properties first (else this ExternalSecret won't
# sync). See docs/runbooks/sn-external-llm-providers.md. List ONLY the providers
# whose Vault property you've seeded — comment out the rest.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: isa-model-provider-keys
  namespace: sn-cloud-production
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: isa-model-provider-keys
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - remoteRef:
        key: isa-cloud/production/llm-providers
        property: openai-api-key
      secretKey: OPENAI_API_KEY
    - remoteRef:
        key: isa-cloud/production/llm-providers
        property: anthropic-api-key
      secretKey: ANTHROPIC_API_KEY
    # Uncomment once seeded in Vault:
    # - remoteRef:
    #     key: isa-cloud/production/llm-providers
    #     property: cerebras-api-key
    #   secretKey: CEREBRAS_API_KEY
    # - remoteRef:
    #     key: isa-cloud/production/llm-providers
    #     property: openrouter-api-key
    #   secretKey: OPENROUTER_API_KEY
