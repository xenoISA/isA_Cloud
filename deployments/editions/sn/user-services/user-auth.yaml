name: user-auth
image:
  repository: isa/user-auth
  # 0.1.4: rebuilt from main with `import json` present. 0.1.3 (built from #522)
  # was missing the import, so _pending_store's json.dumps raised NameError that
  # the redis-fallback except swallowed -> silent pod-local in-memory storage
  # (empty redis keyspace -> cross-pod login-after-verify race). #519 added the
  # import to main incidentally; this rebuild ships it.
  tag: "0.1.4"
port: 8201
env:
  - {name: SERVICE_NAME, value: "auth_service"}
  - {name: SERVICE_PORT, value: "8201"}
health: {path: /health, initialDelaySeconds: 30, periodSeconds: 10}
liveness: {path: /health, initialDelaySeconds: 60, periodSeconds: 20}
