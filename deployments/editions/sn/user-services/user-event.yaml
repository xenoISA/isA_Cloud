name: user-event
image:
  repository: isa/user-event
  tag: "0.1.0"
port: 8230
env:
  - {name: SERVICE_NAME, value: "event_service"}
  - {name: SERVICE_PORT, value: "8230"}
health: {path: /health, initialDelaySeconds: 30, periodSeconds: 10}
liveness: {path: /health, initialDelaySeconds: 60, periodSeconds: 20}
