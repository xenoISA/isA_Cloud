name: user-billing
image:
  repository: isa/user-billing
  tag: "0.1.0"
port: 8216
env:
  - {name: SERVICE_NAME, value: "billing_service"}
  - {name: SERVICE_PORT, value: "8216"}
health: {path: /health, initialDelaySeconds: 30, periodSeconds: 10}
liveness: {path: /health, initialDelaySeconds: 60, periodSeconds: 20}
