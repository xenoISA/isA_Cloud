name: user-device
image:
  repository: isa/user-device
  tag: "0.1.0"
port: 8220
env:
  - {name: SERVICE_NAME, value: "device_service"}
  - {name: SERVICE_PORT, value: "8220"}
health: {path: /health, initialDelaySeconds: 30, periodSeconds: 10}
liveness: {path: /health, initialDelaySeconds: 60, periodSeconds: 20}
