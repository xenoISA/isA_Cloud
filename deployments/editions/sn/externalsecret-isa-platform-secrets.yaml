apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  finalizers:
  - externalsecrets.external-secrets.io/externalsecret-cleanup
  name: isa-platform-secrets
  namespace: sn-cloud-production
spec:
  data:
  - remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: isa-cloud/production/postgresql
      metadataPolicy: None
      nullBytePolicy: Ignore
      property: password
    secretKey: POSTGRES_PASSWORD
  - remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: isa-cloud/production/redis
      metadataPolicy: None
      nullBytePolicy: Ignore
      property: password
    secretKey: REDIS_PASSWORD
  - remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: isa-cloud/production/minio
      metadataPolicy: None
      nullBytePolicy: Ignore
      property: root-user
    secretKey: MINIO_ACCESS_KEY
  - remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: isa-cloud/production/minio
      metadataPolicy: None
      nullBytePolicy: Ignore
      property: root-password
    secretKey: MINIO_SECRET_KEY
  - remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: isa-cloud/production/apisix
      metadataPolicy: None
      nullBytePolicy: Ignore
      property: admin-key
    secretKey: APISIX_ADMIN_KEY
  - remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: isa-cloud/production/platform
      metadataPolicy: None
      nullBytePolicy: Ignore
      property: internal-service-secret
    secretKey: INTERNAL_SERVICE_SECRET
  - remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: isa-cloud/production/platform
      metadataPolicy: None
      nullBytePolicy: Ignore
      property: internal-service-secret
    secretKey: ISA_MATE_API_KEY
  # Managed web-data providers (ADR isA_Data 0005). Aggregated here because
  # isa-data consumes this secret via envFrom (key name == env var name).
  # ONLY add a key once its Vault property exists, or ESO fails the whole sync.
  # Bright Data shares the isA_OS pool_manager account. Oxylabs added when an
  # account exists (seed secret/isa-cloud/production/data-managed-web first).
  - remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: isa-cloud/production/data-managed-web
      metadataPolicy: None
      nullBytePolicy: Ignore
      property: brightdata-api-key
    secretKey: BRIGHTDATA_API_KEY
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: isa-platform-secrets

