# =============================================================================
# isa-license-pubkey — ed25519 PUBLIC verification key            (#370, ADR 0008)
# =============================================================================
# The ed25519 PUBLIC key (SubjectPublicKeyInfo PEM) that isa_common/license.py
# uses to verify the signature on the mounted license.json (ADR 0008 §1, §6).
#
# NON-SECRET by design: a leaked public key CANNOT forge a license — only the
# isA-side offline PRIVATE key (custody: docs/saas-deployment/license-key-custody.md)
# can sign. So this is a plain ConfigMap, not a Secret.
#
# Injected as env ISA_LICENSE_PUBKEY via a configMapKeyRef in isa-svc-base.yaml
# (key `ed25519.pub`), exactly per ADR 0008 §6. license.py loads it with
# cryptography.load_pem_public_key — so the value MUST be the full PEM block.
#
# DELIVERY: shipped in the SN offline delivery bundle (ADR 0007) alongside the
# edition overlays. The value below is a PLACEHOLDER — replace it with the real
# isA license public key for the SN deployment before apply (the matching public
# key for the private key that signed sn-cloud-production's license.json).
# Generated by: python -m isa_common.license_sign keygen --out-dir ./keys
#   → keys/isa-license-ed25519.pub  (this value)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: isa-license-pubkey
  namespace: sn-cloud-production
data:
  # REPLACE with the real isA ed25519 public key (SubjectPublicKeyInfo PEM).
  ed25519.pub: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_WITH_REAL_ED25519_PUBLIC_KEY_FROM_OFFLINE_BUNDLE
    -----END PUBLIC KEY-----
