# =============================================================================
# Edition profile — On-Prem LITE (single-tenant, no big-data)  isA_Cloud #316
# =============================================================================
# Overlay on top of values-base.yaml. The lean enterprise on-prem install for
# smaller customers:
#   * big-data umbrella DISABLED (lightweight data stores only)
#   * single-tenant — multi-tenant OFF, charging OFF
#   * brand WHITE-LABELABLE — overlay a values-brand-<customer>.example.yaml
#
# Matrix: docs/saas-deployment/README.md (企业版·精简) / ADR 0006.
#
#   helm install isa-on-prem-lite ./deployments/charts/isa-service \
#     -f deployments/editions/values-base.yaml \
#     -f deployments/editions/values-on-prem-lite.yaml \
#     -f deployments/editions/values-brand-sn.example.yaml
# =============================================================================

# Big-data umbrella DISABLED — do not install isa-bigdata for the lite edition.
bigdata:
  enabled: false

modules:
  metering: true
  charging: false
  multiTenant: false

# Full env list. This edition matches isa_common.edition's conservative default
# (no env -> on-prem-lite), but we set it explicitly for clarity. Brand keys are
# white-labelable via a brand overlay.
env:
  # --- Edition contract (#317) ---
  - name: ISA_EDITION
    value: "on-prem-lite"
  - name: ISA_BIGDATA_ENABLED
    value: "false"
  - name: ISA_METERING_ENABLED
    value: "true"
  - name: ISA_CHARGING_ENABLED
    value: "false"
  - name: ISA_MULTI_TENANT
    value: "false"
  # --- Brand: isA defaults (override via a brand overlay to white-label) ---
  - name: BRAND_NAME
    value: "isA"
  - name: BRAND_DISPLAY_NAME
    value: "isA Platform"
  - name: BRAND_ORG_NAME
    value: "isA"
  - name: BRAND_SUPPORT_EMAIL
    value: "dev@iapro.ai"
  - name: AUTH_COOKIE_DOMAIN
    value: ".iapro.ai"
  - name: BRAND_PRIMARY_HOST
    value: "isa.dev"
  - name: BRAND_DOCS_URL
    value: "docs.isa.dev"
