# =============================================================================
# Production Applications Kustomization
# =============================================================================
# IMPORTANT: Production apps do NOT auto-sync. Manual approval required.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - secret-management.yaml
  - core-services.yaml
  - os-services.yaml
  - blockchain-service.yaml
  - user-services-appset.yaml
  - sn-customer-modules-appset.yaml   # entitlement-gated SN modules (#369)

commonLabels:
  managed-by: argocd
  environment: production
  critical: "true"
