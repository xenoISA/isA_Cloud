# =============================================================================
# Secret Management - Production
# =============================================================================
# Deploys HashiCorp Vault (HA) + External Secrets Operator.
# Vault stores secrets, ESO syncs them to K8s Secrets.
#
# Sync order (via sync waves):
#   Wave -2: Vault operator (must be running first)
#   Wave -1: External Secrets Operator (must be running before ExternalSecrets)
#   Wave  0: ClusterSecretStore + ExternalSecret CRs (created by manifests/)
#
# IMPORTANT: After first deploy, run vault-init.sh to initialize and unseal Vault.
# =============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-production
  namespace: argocd
  labels:
    app: vault
    environment: production
    tier: infrastructure
    critical: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: isa-deployments
    notifications.argoproj.io/subscribe.on-sync-failed.slack: isa-alerts
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.28.*
    helm:
      valueFiles: []
      values: |
        global:
          enabled: true
        server:
          ha:
            enabled: true
            replicas: 3
            raft:
              enabled: false
            config: |
              ui = true
              listener "tcp" {
                tls_disable = 1
                address = "[::]:8200"
                cluster_address = "[::]:8201"
              }
              storage "consul" {
                path = "vault/"
                address = "consul-server.isa-cloud-production.svc.cluster.local:8500"
              }
              service_registration "kubernetes" {}
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          auditStorage:
            enabled: true
            size: 10Gi
          dataStorage:
            enabled: false
          standalone:
            enabled: false
        injector:
          enabled: false
        ui:
          enabled: true
          serviceType: ClusterIP
        csi:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: isa-cloud-production
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-production
  namespace: argocd
  labels:
    app: external-secrets
    environment: production
    tier: infrastructure
    critical: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: isa-deployments
    notifications.argoproj.io/subscribe.on-sync-failed.slack: isa-alerts
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.*
    helm:
      values: |
        installCRDs: true
        replicaCount: 2
        webhook:
          replicaCount: 2
        certController:
          replicaCount: 1
        leaderElect: true
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
