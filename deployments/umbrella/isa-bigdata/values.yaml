# =============================================================================
# isa-bigdata umbrella — defaults
# =============================================================================
# This file holds the DEFAULT pass-through values for the bundled subcharts.
# Environment-specific overrides live under deployments/values/*.yaml and are
# applied via `helm template ... -f values/<env>.yaml`.
#
# Default profile here matches the staging tier (3-broker Kafka, single
# Apicurio replica, no NetworkPolicy). It deliberately does NOT match
# customer-prod — production must explicitly opt in via values/customer-prod.
# =============================================================================

kafka:
  enabled: true
  namespace: isa-bigdata

apicurio-registry:
  enabled: true
  namespace: isa-bigdata

postgres-bigdata:
  enabled: true

hive-metastore:
  enabled: true
  namespace: isa-bigdata

minio:
  enabled: true

iceberg-tools:
  enabled: true
  namespace: isa-bigdata

starrocks:
  enabled: true

flink:
  enabled: true

flink-cdc-jobs:
  enabled: true
  namespace: isa-bigdata

# Shell chart — disabled by default at all profiles. Flip post-W12 ADR.
# See deployments/charts/fluss/README.md for the activation gate.
fluss:
  enabled: false
