apiVersion: v2
name: isa-bigdata
description: |
  Umbrella chart that aggregates the big-data foundation components
  declared in xenoISA/sn-commercial-tower ADR-0002 §2.5 and
  bigdata-architecture.md §4.1, with the Paimon → Iceberg revision
  per appendix-architecture-v3-iceberg.md (xenoISA/isA_Cloud#260):
  Kafka (Strimzi-managed) + Apicurio Registry + postgres-bigdata +
  hive-metastore + minio + iceberg-tools + starrocks + flink +
  flink-cdc-jobs + fluss (shell).
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - kafka
  - apicurio
  - bigdata
  - data-platform
sources:
  - https://github.com/xenoISA/isA_Cloud
maintainers:
  - name: isA Platform
dependencies:
  - name: kafka
    version: 0.1.0
    repository: file://../../charts/kafka
    condition: kafka.enabled
  - name: apicurio-registry
    version: 0.1.0
    repository: file://../../charts/apicurio-registry
    condition: apicurio-registry.enabled
  - name: postgres-bigdata
    version: 0.1.0
    repository: file://../../charts/postgres-bigdata
    condition: postgres-bigdata.enabled
  - name: hive-metastore
    version: 0.1.0
    repository: file://../../charts/hive-metastore
    condition: hive-metastore.enabled
  - name: minio
    version: 0.1.0
    repository: file://../../charts/minio
    condition: minio.enabled
  - name: iceberg-tools
    version: 0.2.0
    repository: file://../../charts/iceberg-tools
    condition: iceberg-tools.enabled
  - name: starrocks
    version: 0.1.0
    repository: file://../../charts/starrocks
    condition: starrocks.enabled
  - name: flink
    version: 0.1.0
    repository: file://../../charts/flink
    condition: flink.enabled
  - name: flink-cdc-jobs
    version: 0.1.0
    repository: file://../../charts/flink-cdc-jobs
    condition: flink-cdc-jobs.enabled
  - name: fluss
    version: 0.1.0
    repository: file://../../charts/fluss
    condition: fluss.enabled
