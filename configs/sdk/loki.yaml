# Loki SDK Client Configuration
# File: configs/sdk/loki.yaml
# Used by: AsyncLokiClient (native HTTP, extends AsyncBaseClient)

# Connection
host: "localhost"
port: 3100

# Authentication (multi-tenant mode)
tenant_id: ""                              # X-Scope-OrgID header value

# Batching
batch_size: 100                            # Flush after N entries
flush_interval: 1.0                        # Flush interval in seconds

# Default labels (applied to all log entries)
default_labels:
  app: "isa-cloud"
  environment: "development"

# ========================================
# Environment Variable Overrides
# ========================================
# LOKI_HOST            - Loki server host
# LOKI_PORT            - Loki server port
# LOKI_TENANT_ID       - Multi-tenant org ID
# LOKI_BATCH_SIZE      - Batch size before auto-flush
# LOKI_FLUSH_INTERVAL  - Auto-flush interval (seconds)
