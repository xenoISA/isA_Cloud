# Prometheus Configuration - LOCAL
# Used by docker-compose for local development.
# Scrapes isA services that expose /metrics endpoints.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # isA platform services (docker-compose)
  # Services use isa_common.metrics.setup_metrics() which exposes /metrics
  - job_name: 'isa-services'
    metrics_path: /metrics
    static_configs:
      - targets: ['isa-gateway:8000']
        labels:
          app: isa-gateway
      - targets: ['isa-mcp:8081']
        labels:
          app: isa-mcp
      - targets: ['isa-model:8082']
        labels:
          app: isa-model
      - targets: ['isa-agent:8080']
        labels:
          app: isa-agent
      - targets: ['isa-trade:8083']
        labels:
          app: isa-trade
      - targets: ['isa-user:8084']
        labels:
          app: isa-user
      - targets: ['isa-creative:8085']
        labels:
          app: isa-creative
      - targets: ['isa-os:8086']
        labels:
          app: isa-os
      - targets: ['isa-pool-manager:8090']
        labels:
          app: isa-pool-manager
      - targets: ['isa-mcp-worker:8091']
        labels:
          app: isa-mcp-worker
      - targets: ['isa-data:8084']
        labels:
          app: isa-data

  # Infrastructure exporters
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          app: redis

  - job_name: 'nats'
    metrics_path: /metrics
    static_configs:
      - targets: ['nats:8222']
        labels:
          app: nats

  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          app: postgresql

  - job_name: 'minio'
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']
        labels:
          app: minio
